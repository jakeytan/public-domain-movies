    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f10;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #fff;
        }

        :root {
            --movie-poster-aspect: 941 / 1672;
            --movie-backdrop-aspect: 1448 / 1086;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1f;
        }
        ::-webkit-scrollbar-thumb {
            background: #e50914;
            border-radius: 4px;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 100%);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(229, 9, 20, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            min-width: 0;
        }

        .logo:hover {
            transform: translateY(-2px);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            flex: 0 0 40px;
            display: block;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.4);
            transition: all 0.3s;
            object-fit: contain;
            background: transparent;
        }

        .logo:hover .logo-icon {
            transform: rotate(6deg) scale(1.05);
            box-shadow: 0 6px 16px rgba(229, 9, 20, 0.6);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .logo-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #e50914 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .logo:hover .logo-brand {
            font-size: 1.55rem;
        }

        .logo-tagline {
            font-size: 0.65rem;
            color: #a3a3a3;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
            white-space: nowrap;
        }

        .logo:hover .logo-tagline {
            color: #e50914;
        }
        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.16);
            color: #fff;
            background: rgba(255,255,255,0.06);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.14);
            transform: translateY(-1px);
        }

        .share-link {
            cursor: pointer;
            margin-left: 0.75rem;
        }

        .share-toast {
            position: fixed;
            left: 50%;
            bottom: 2rem;
            transform: translateX(-50%) translateY(20px);
            max-width: min(90vw, 460px);
            background: rgba(24,24,28,0.96);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 14px;
            padding: 0.9rem 1.1rem;
            box-shadow: 0 16px 40px rgba(0,0,0,0.35);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 2000;
            line-height: 1.5;
            font-size: 0.92rem;
        }

        .share-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .live-entry {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 5%;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 1.25rem;
            align-items: center;
        }

        .live-entry-card,
        .live-entry-meta {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 1.8rem;
            box-shadow: 0 18px 50px rgba(0,0,0,0.18);
        }

        .live-entry-card h2 {
            font-size: 2rem;
            margin-bottom: 0.8rem;
        }

        .live-label {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #fff;
            background: rgba(229,9,20,0.12);
            padding: 0.55rem 0.9rem;
            border-radius: 999px;
        }

        .live-entry-meta {
            display: grid;
            gap: 0.85rem;
        }

        .live-entry-meta div {
            font-size: 0.95rem;
            color: #e7e7e7;
        }

        .live-entry-meta strong {
            display: block;
            margin-bottom: 0.35rem;
            color: #fff;
        }
        /* Hero 大屏区域 */
        .hero {
            position: relative;
            aspect-ratio: var(--movie-backdrop-aspect);
            height: auto;
            max-height: 900px;
            min-height: 420px;
            width: 100%;
            background:
                radial-gradient(circle at 70% 20%, rgba(229,9,20,0.18), transparent 32%),
                linear-gradient(0deg, #0f0f10 0%, rgba(15,15,16,0.92) 100%);
            overflow: hidden;
            margin-top: 0;
        }

        .hero-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 0;
            filter: brightness(0.58);
            transition: transform 0.3s ease;
        }

        .hero-content {
            position: absolute;
            bottom: 20%;
            left: 5%;
            max-width: 600px;
            z-index: 2;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .hero-overview {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            opacity: 0.9;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .hero-rating {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            border-left: 3px solid #e50914;
        }

        .hero-genre {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .btn-play {
            background: #e50914;
            border: none;
            color: white;
            padding: 0.7rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-play:hover {
            background: #b20710;
            transform: scale(1.02);
        }

        /* 主内容区 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 5% 4rem;
        }

        /* 分类按钮 */
        .genre-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
        }

        .genre-btn {
            background: transparent;
            border: none;
            color: #b3b3b3;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .genre-btn:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }
        .genre-btn.active {
            background: #e50914;
            color: white;
            box-shadow: 0 4px 12px rgba(229,9,20,0.3);
        }

        /* 电影网格 */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .movie-card {
            background: #1c1c1f;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s;
            animation: fadeInScale 0.4s ease forwards;
        }
        .movie-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 15px 25px -10px rgba(0,0,0,0.6);
        }

        .poster-wrapper {
            aspect-ratio: var(--movie-poster-aspect);
            overflow: hidden;
            background: #111;
        }
        .poster {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.4s;
        }
        .movie-card:hover .poster {
            transform: scale(1.05);
        }

        .movie-info {
            padding: 0.8rem;
        }
        .movie-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-year {
            font-size: 0.7rem;
            color: #a3a3a3;
        }

        /* 播放器模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .modal.active {
            display: flex;
            animation: fadeIn 0.2s;
        }
        .modal-container {
            width: 90%;
            max-width: 1000px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        .video-wrapper {
            aspect-ratio: 16 / 9;
            width: 100%;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            outline: none;
        }
        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
            padding: 0 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
        }
        .modal-info {
            padding: 1rem;
            background: #111;
            font-size: 0.9rem;
        }

        /* 加载动画 */
        .loader {
            text-align: center;
            padding: 3rem;
            color: #aaa;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 768px) {
            .navbar {
                gap: 0.75rem;
                padding: 0.75rem 1rem;
            }
            .navbar > div:last-child {
                display: flex;
                gap: 0.5rem;
                flex: 0 0 auto;
            }
            .hero {
                height: auto;
                min-height: 0;
                max-height: none;
                aspect-ratio: var(--movie-backdrop-aspect);
            }
            .hero-title {
                font-size: 1.8rem;
            }
            .hero-overview {
                font-size: 0.8rem;
                line-clamp: 2;
                -webkit-line-clamp: 2;
            }
            .hero-content {
                bottom: 15%;
                left: 5%;
                right: 5%;
            }
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 1rem;
            }
            .genre-btn {
                font-size: 0.8rem;
                padding: 0.3rem 1rem;
            }
            .logo {
                gap: 8px;
                flex: 1 1 auto;
                min-width: 0;
            }
            .logo-icon {
                width: 36px;
                height: 36px;
                flex-basis: 36px;
                font-size: 20px;
            }
            .logo-brand {
                font-size: 1.2rem;
            }
            .logo-tagline {
                font-size: 0.6rem;
                display: none;
            }
            .nav-link {
                padding: 0.55rem 0.7rem;
                font-size: 0.82rem;
            }
            .share-link {
                margin-left: 0;
            }
        }
    </style>

<nav class="navbar">

<script src="player.js"></script>
<script>
    // ---------- 公有领域电影数据（可直接增加或修改）----------
    const moviesData = [
        {

            backdrop: "https://images.unsplash.com/photo-1505664194779-8beaceb93744?w=1200", 
            poster: "https://placehold.co/300x450?text=All+Quiet&bg=111111&fg=ffffff",

        },
        {

            director: "弗里茨·朗",

            rating: "⭐⭐⭐⭐ 7.8",

        {

            overview: "巴斯特·基顿的火车追逐动作喜剧巅峰。", 
            director: "巴斯特·基顿、克莱德·布鲁克曼",
            rating: "⭐⭐⭐⭐⭐ 8.7", 
            backdrop: "https://images.unsplash.com/photo-1587923623987-c7e4081beb5f?w=1200",

            videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" 
        }
    ];

    let currentMovies = [...moviesData];
    let currentHeroMovie = currentMovies[0];
    let currentVideoPlayer = null;

    // 分类映射
    function getGenreLabel(genre) {
        const map = { Comedy: "喜剧", Drama: "剧情", "Sci-Fi": "科幻", Horror: "恐怖", Action: "动作" };
        return map[genre] || genre;
    }

    // 渲染分类按钮
    function renderGenreFilter() {
        const genres = [...new Set(moviesData.map(m => m.genre))];
        const container = document.getElementById('genreFilterContainer');
        container.innerHTML = '<button class="genre-btn active" data-genre="all">全部</button>';
        genres.forEach(g => {
            const btn = document.createElement('button');
            btn.className = 'genre-btn';
            btn.setAttribute('data-genre', g);
            btn.textContent = getGenreLabel(g);
            btn.addEventListener('click', () => filterByGenre(g));
            container.appendChild(btn);
        });
    }

    // 按分类筛选
    function filterByGenre(genre) {
        if (genre === 'all') {
            currentMovies = [...moviesData];
        } else {
            currentMovies = moviesData.filter(m => m.genre === genre);
        }
        // 更新按钮激活样式
        document.querySelectorAll('.genre-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-genre') === genre) btn.classList.add('active');
            if (genre === 'all' && btn.getAttribute('data-genre') === 'all') btn.classList.add('active');
        });
        renderMoviesGrid();
        // 如果筛选后列表不为空，更新Hero为第一个电影
        if (currentMovies.length) setHeroMovie(currentMovies[0]);
    }

    // 渲染电影网格
    function renderMoviesGrid() {
        const grid = document.getElementById('moviesGrid');
        if (!currentMovies.length) {
            grid.innerHTML = '<div class="loader">🎬 暂无此分类影片，我们会陆续添加更多公版经典。</div>';
            return;
        }
        let html = '';
        currentMovies.forEach((movie, idx) => {
            html += `
                <div class="movie-card" data-movie-id="${movie.id}">
                    <div class="poster-wrapper">
                        <img class="poster" src="${movie.poster}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/300x450?text=Classic&bg=111111&fg=ffffff'">
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-year">${movie.year} · ${getGenreLabel(movie.genre)}</div>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;
        // 绑定卡片点击事件 - 跳转到详情页
        document.querySelectorAll('.movie-card').forEach(card => {
            const movieId = parseInt(card.getAttribute('data-movie-id'));
            card.addEventListener('click', () => {
                window.location.href = `detail.html?id=${movieId}`;
            });
        });
    }

    // 设置Hero Banner
    function setHeroMovie(movie) {
        currentHeroMovie = movie;
        document.getElementById('heroTitle').innerText = movie.title;
        document.getElementById('heroOverview').innerText = movie.overview;
        document.getElementById('heroRating').innerHTML = movie.rating;
        document.getElementById('heroGenre').innerHTML = getGenreLabel(movie.genre);
        document.getElementById('heroBackdrop').src = movie.backdrop;
        // 替换播放按钮事件（避免重复绑定）
        const oldBtn = document.getElementById('heroPlayBtn');
        const newBtn = oldBtn.cloneNode(true);
        oldBtn.parentNode.replaceChild(newBtn, oldBtn);
        newBtn.addEventListener('click', () => {
            window.location.href = `detail.html?id=${movie.id}`;
        });
    }

    function showShareToast(message) {
        const toast = document.getElementById('shareToast');
        toast.textContent = message;
        toast.classList.add('show');
        window.clearTimeout(window.shareToastTimer);
        window.shareToastTimer = window.setTimeout(() => toast.classList.remove('show'), 4200);
    }

    async function shareSite() {
        const movie = currentHeroMovie || moviesData[0];
        const shareData = {
            title: '鑫艺影像馆',
            text: `来鑫艺影像馆观看公版经典电影：${movie.title}`,
            url: window.location.href
        };

        if (navigator.share) {
            try {
                await navigator.share(shareData);
                return;
            } catch (error) {
                if (error.name === 'AbortError') return;
            }
        }

        try {
            await navigator.clipboard.writeText(shareData.url);
            showShareToast('链接已复制。打开微信朋友圈，粘贴链接即可分享。若在微信内浏览，也可以点右上角菜单分享到朋友圈。');
        } catch (error) {
            showShareToast('请复制当前页面地址，在微信朋友圈发布；若在微信内浏览，可点右上角菜单分享到朋友圈。');
        }
    }

    // 播放电影（模态框）
    function playMovie(movie) {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        modal.classList.add('active');
        document.getElementById('modalMovieTitle').innerHTML = `<strong>${movie.title}</strong> (${movie.year}) · 公有领域免费观影`;
        
        // 使用 StreamPlayer 初始化
        if (!window.indexPlayer) {
            window.indexPlayer = new StreamPlayer(video, {
                autoplay: true,
                hlsConfig: {
                    maxLoadingDelay: 4,
                    minAutoBitrate: 0,
                    maxAutoBitrate: 8000000,
                    startLevel: -1
                }
            });
        }
        
        window.indexPlayer.load(movie.videoUrl, 'auto');
    }

    // 关闭模态框
    function closeModal() {
        const modal = document.getElementById('videoModal');
        modal.classList.remove('active');
        
        if (window.indexPlayer) {
            window.indexPlayer.pause();
            window.indexPlayer.dispose();
            window.indexPlayer = null;
        }
    }

    // 初始化
    function init() {
        renderGenreFilter();
        currentMovies = [...moviesData];
        renderMoviesGrid();
        setHeroMovie(moviesData[0]);
        // 模态关闭事件
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('videoModal')) closeModal();
        });
        document.getElementById('shareSiteBtn').addEventListener('click', shareSite);
    }

    init();
</script>
</body>
</html>
