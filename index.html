<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>公版映像馆 · 经典电影自由分享</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f10;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #fff;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1f;
        }
        ::-webkit-scrollbar-thumb {
            background: #e50914;
            border-radius: 4px;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 100%);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(229, 9, 20, 0.3);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #e50914 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        /* Hero 大屏区域 */
        .hero {
            position: relative;
            height: 85vh;
            min-height: 500px;
            width: 100%;
            background: linear-gradient(0deg, #0f0f10 0%, rgba(15,15,16,0.8) 100%);
            overflow: hidden;
            margin-top: 0;
        }

        .hero-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.5) blur(2px);
            transition: transform 0.3s ease;
        }

        .hero-content {
            position: absolute;
            bottom: 20%;
            left: 5%;
            max-width: 600px;
            z-index: 2;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .hero-overview {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            opacity: 0.9;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .hero-rating {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            border-left: 3px solid #e50914;
        }

        .hero-genre {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .btn-play {
            background: #e50914;
            border: none;
            color: white;
            padding: 0.7rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-play:hover {
            background: #b20710;
            transform: scale(1.02);
        }

        /* 主内容区 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 5% 4rem;
        }

        /* 分类按钮 */
        .genre-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
        }

        .genre-btn {
            background: transparent;
            border: none;
            color: #b3b3b3;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .genre-btn:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }
        .genre-btn.active {
            background: #e50914;
            color: white;
            box-shadow: 0 4px 12px rgba(229,9,20,0.3);
        }

        /* 电影网格 */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .movie-card {
            background: #1c1c1f;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s;
            animation: fadeInScale 0.4s ease forwards;
        }
        .movie-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 15px 25px -10px rgba(0,0,0,0.6);
        }

        .poster-wrapper {
            aspect-ratio: 2 / 3;
            overflow: hidden;
        }
        .poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .movie-card:hover .poster {
            transform: scale(1.05);
        }

        .movie-info {
            padding: 0.8rem;
        }
        .movie-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-year {
            font-size: 0.7rem;
            color: #a3a3a3;
        }

        /* 播放器模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .modal.active {
            display: flex;
            animation: fadeIn 0.2s;
        }
        .modal-container {
            width: 90%;
            max-width: 1000px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        .video-wrapper {
            aspect-ratio: 16 / 9;
            width: 100%;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            outline: none;
        }
        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
            padding: 0 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
        }
        .modal-info {
            padding: 1rem;
            background: #111;
            font-size: 0.9rem;
        }

        /* 加载动画 */
        .loader {
            text-align: center;
            padding: 3rem;
            color: #aaa;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 1.8rem;
            }
            .hero-overview {
                font-size: 0.8rem;
                -webkit-line-clamp: 2;
            }
            .hero-content {
                bottom: 15%;
                left: 5%;
                right: 5%;
            }
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 1rem;
            }
            .genre-btn {
                font-size: 0.8rem;
                padding: 0.3rem 1rem;
            }
            .logo {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">🎬 鑫艺影像馆</div>
    <div></div>
</nav>

<section class="hero" id="heroSection">
    <img class="hero-backdrop" id="heroBackdrop" src="" alt="backdrop">
    <div class="hero-content">
        <span class="hero-rating" id="heroRating">⭐⭐⭐⭐⭐ 经典</span>
        <span class="hero-genre" id="heroGenre">剧情</span>
        <h1 class="hero-title" id="heroTitle">加载中...</h1>
        <p class="hero-overview" id="heroOverview"></p>
        <div class="hero-meta">
            <button class="btn-play" id="heroPlayBtn">▶ 立即播放</button>
        </div>
    </div>
</section>

<main class="container">
    <div class="genre-filter" id="genreFilterContainer">
        <button class="genre-btn active" data-genre="all">全部</button>
    </div>
    <div class="movies-grid" id="moviesGrid">
        <div class="loader">🎞️ 正在载入经典电影...</div>
    </div>
</main>

<div id="videoModal" class="modal">
    <div class="modal-container">
        <button class="close-modal" id="closeModalBtn">✕</button>
        <div class="video-wrapper">
            <video id="videoPlayer" controls></video>
        </div>
        <div class="modal-info" id="modalMovieTitle"></div>
    </div>
</div>

<script>
    // ---------- 公有领域电影数据（可直接增加或修改）----------
    const moviesData = [
        { title: "The Circus", year: 1928, genre: "Comedy", overview: "卓别林大师经典默片，笑中带泪的马戏团故事。", rating: "⭐⭐⭐⭐⭐ 9.2", backdrop: "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=1200", poster: "https://via.placeholder.com/300x450?text=The+Circus", videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
        { title: "All Quiet on the Western Front", year: 1930, genre: "Drama", overview: "反战史诗，第一次世界大战惨烈真实写照。", rating: "⭐⭐⭐⭐⭐ 8.9", backdrop: "https://images.unsplash.com/photo-1505664194779-8beaceb93744?w=1200", poster: "https://via.placeholder.com/300x450?text=All+Quiet", videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
        { title: "Metropolis", year: 1927, genre: "Sci-Fi", overview: "德国表现主义科幻巨作，影响后世无数电影。", rating: "⭐⭐⭐⭐⭐ 8.5", backdrop: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=1200", poster: "https://via.placeholder.com/300x450?text=Metropolis", videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
        { title: "Nosferatu", year: 1922, genre: "Horror", overview: "影史第一部吸血鬼电影，恐怖氛围至今经典。", rating: "⭐⭐⭐⭐ 8.0", backdrop: "https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=1200", poster: "https://via.placeholder.com/300x450?text=Nosferatu", videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
        { title: "Modern Times", year: 1936, genre: "Comedy", overview: "卓别林对工业时代的辛辣讽刺。", rating: "⭐⭐⭐⭐⭐ 9.0", backdrop: "https://images.unsplash.com/photo-1518834107819-67b0b7c58434?w=1200", poster: "https://via.placeholder.com/300x450?text=Modern+Times", videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
        { title: "Frankenstein", year: 1931, genre: "Horror", overview: "科学怪人的银幕始祖，哥特恐怖经典。", rating: "⭐⭐⭐⭐ 7.8", backdrop: "https://images.unsplash.com/photo-1516916759473-600c07bc12d4?w=1200", poster: "https://via.placeholder.com/300x450?text=Frankenstein", videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
        { title: "The General", year: 1926, genre: "Action", overview: "巴斯特·基顿的火车追逐动作喜剧巅峰。", rating: "⭐⭐⭐⭐⭐ 8.7", backdrop: "https://images.unsplash.com/photo-1587923623987-c7e4081beb5f?w=1200", poster: "https://via.placeholder.com/300x450?text=The+General", videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" }
    ];

    let currentMovies = [...moviesData];
    let currentHeroMovie = currentMovies[0];
    let currentVideoPlayer = null;

    // 分类映射
    function getGenreLabel(genre) {
        const map = { Comedy: "喜剧", Drama: "剧情", "Sci-Fi": "科幻", Horror: "恐怖", Action: "动作" };
        return map[genre] || genre;
    }

    // 渲染分类按钮
    function renderGenreFilter() {
        const genres = [...new Set(moviesData.map(m => m.genre))];
        const container = document.getElementById('genreFilterContainer');
        container.innerHTML = '<button class="genre-btn active" data-genre="all">全部</button>';
        genres.forEach(g => {
            const btn = document.createElement('button');
            btn.className = 'genre-btn';
            btn.setAttribute('data-genre', g);
            btn.textContent = getGenreLabel(g);
            btn.addEventListener('click', () => filterByGenre(g));
            container.appendChild(btn);
        });
    }

    // 按分类筛选
    function filterByGenre(genre) {
        if (genre === 'all') {
            currentMovies = [...moviesData];
        } else {
            currentMovies = moviesData.filter(m => m.genre === genre);
        }
        // 更新按钮激活样式
        document.querySelectorAll('.genre-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-genre') === genre) btn.classList.add('active');
            if (genre === 'all' && btn.getAttribute('data-genre') === 'all') btn.classList.add('active');
        });
        renderMoviesGrid();
        // 如果筛选后列表不为空，更新Hero为第一个电影
        if (currentMovies.length) setHeroMovie(currentMovies[0]);
    }

    // 渲染电影网格
    function renderMoviesGrid() {
        const grid = document.getElementById('moviesGrid');
        if (!currentMovies.length) {
            grid.innerHTML = '<div class="loader">🎬 暂无此分类影片，我们会陆续添加更多公版经典。</div>';
            return;
        }
        let html = '';
        currentMovies.forEach((movie, idx) => {
            html += `
                <div class="movie-card" data-index="${idx}">
                    <div class="poster-wrapper">
                        <img class="poster" src="${movie.poster}" alt="${movie.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=Classic'">
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-year">${movie.year} · ${getGenreLabel(movie.genre)}</div>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;
        // 绑定卡片点击事件
        document.querySelectorAll('.movie-card').forEach(card => {
            const idx = parseInt(card.getAttribute('data-index'));
            card.addEventListener('click', () => playMovie(currentMovies[idx]));
        });
    }

    // 设置Hero Banner
    function setHeroMovie(movie) {
        currentHeroMovie = movie;
        document.getElementById('heroTitle').innerText = movie.title;
        document.getElementById('heroOverview').innerText = movie.overview;
        document.getElementById('heroRating').innerHTML = movie.rating;
        document.getElementById('heroGenre').innerHTML = getGenreLabel(movie.genre);
        document.getElementById('heroBackdrop').src = movie.backdrop;
        // 替换播放按钮事件（避免重复绑定）
        const oldBtn = document.getElementById('heroPlayBtn');
        const newBtn = oldBtn.cloneNode(true);
        oldBtn.parentNode.replaceChild(newBtn, oldBtn);
        newBtn.addEventListener('click', () => playMovie(movie));
    }

    // 播放电影（模态框）
    function playMovie(movie) {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        video.src = movie.videoUrl;
        modal.classList.add('active');
        video.play();
        document.getElementById('modalMovieTitle').innerHTML = `<strong>${movie.title}</strong> (${movie.year}) · 公有领域免费观影`;
    }

    // 关闭模态框
    function closeModal() {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        modal.classList.remove('active');
        video.pause();
        video.src = '';
    }

    // 初始化
    function init() {
        renderGenreFilter();
        currentMovies = [...moviesData];
        renderMoviesGrid();
        setHeroMovie(moviesData[0]);
        // 模态关闭事件
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('videoModal')) closeModal();
        });
    }

    init();
</script>
</body>
</html>
