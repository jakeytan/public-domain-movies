<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>MovieHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 顶部导航 -->
<header class="navbar">
  <div class="logo">MOVIEHUB</div>
  <input id="search" placeholder="🔍 搜索电影...">
</header>

<!-- Banner -->
<section id="banner">
  <div class="overlay"></div>
  <div class="banner-content">
    <h1 id="banner-title"></h1>
    <div class="buttons">
      <button id="play-banner">▶ 播放</button>
    </div>
  </div>
</section>

<!-- 分类 -->
<main id="categories"></main>

<!-- 播放器 -->
<div id="player-modal" class="hidden">
  <span id="close-btn">✖</span>
  <video id="video-player" controls autoplay></video>
</div>

<script src="script.js"></script>
</body>
</html>
