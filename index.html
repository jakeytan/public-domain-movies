<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="鑫艺影像馆，经典电影自由分享平台。">
    <meta property="og:title" content="鑫艺影像馆 · 致敬经典电影">
    <meta property="og:description" content="观看并分享经典电影。">
    <meta property="og:image" content="https://pub-c8dff8c2f0a44d65a2aa76008f27ed86.r2.dev/Circle_hb_h.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <title>鑫艺影像馆 · 致敬经典电影</title>
    <!-- HLS.js 库 (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f10;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #fff;
        }

        body.modal-open {
            overflow: hidden;
            touch-action: none;
        }

        :root {
            --movie-poster-aspect: 941 / 1672;
            --movie-backdrop-aspect: 1448 / 1086;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1f;
        }
        ::-webkit-scrollbar-thumb {
            background: #e50914;
            border-radius: 4px;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 100%);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(229, 9, 20, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            min-width: 0;
        }

        .logo:hover {
            transform: translateY(-2px);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            flex: 0 0 40px;
            display: block;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.4);
            transition: all 0.3s;
            object-fit: contain;
            background: transparent;
        }

        .logo:hover .logo-icon {
            transform: rotate(6deg) scale(1.05);
            box-shadow: 0 6px 16px rgba(229, 9, 20, 0.6);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .logo-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #e50914 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .logo:hover .logo-brand {
            font-size: 1.55rem;
        }

        .logo-tagline {
            font-size: 0.65rem;
            color: #a3a3a3;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
            white-space: nowrap;
        }

        .logo:hover .logo-tagline {
            color: #e50914;
        }
        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.16);
            color: #fff;
            background: rgba(255,255,255,0.06);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.14);
            transform: translateY(-1px);
        }

        .share-link {
            cursor: pointer;
            margin-left: 0.75rem;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .search-input {
            width: min(24vw, 260px);
            min-width: 180px;
            height: 42px;
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            padding: 0 1rem;
            font: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: #a8a8b2;
        }

        .search-input:focus {
            border-color: rgba(229,9,20,0.75);
            background: rgba(255,255,255,0.12);
        }

        .share-toast {
            position: fixed;
            left: 50%;
            bottom: 2rem;
            transform: translateX(-50%) translateY(20px);
            max-width: min(90vw, 460px);
            background: rgba(24,24,28,0.96);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 14px;
            padding: 0.9rem 1.1rem;
            box-shadow: 0 16px 40px rgba(0,0,0,0.35);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 2000;
            line-height: 1.5;
            font-size: 0.92rem;
        }

        .share-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Hero 大屏区域 */
        .hero {
            position: relative;
            aspect-ratio: var(--movie-backdrop-aspect);
            height: clamp(560px, 78vh, 920px);
            max-height: none;
            min-height: 560px;
            width: 100%;
            background:
                radial-gradient(circle at 72% 18%, rgba(229,9,20,0.22), transparent 34%),
                linear-gradient(0deg, #0f0f10 0%, rgba(15,15,16,0.92) 100%);
            overflow: hidden;
            margin-top: 0;
            cursor: pointer;
        }

        .hero-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.72) saturate(1.05);
            transition: opacity 0.45s ease, transform 0.45s ease;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(15,15,16,0.94) 0%, rgba(15,15,16,0.62) 36%, rgba(15,15,16,0.1) 74%),
                linear-gradient(0deg, #0f0f10 0%, rgba(15,15,16,0.08) 48%, rgba(15,15,16,0.18) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .hero-content {
            position: absolute;
            bottom: 20%;
            left: 5%;
            max-width: min(680px, 52vw);
            z-index: 2;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero-poster-rail {
            position: absolute;
            right: 5%;
            bottom: 8%;
            z-index: 3;
            display: flex;
            align-items: flex-end;
            gap: 0.8rem;
            max-width: min(48vw, 620px);
            overflow: hidden;
        }

        .hero-poster-card {
            width: clamp(78px, 8vw, 126px);
            aspect-ratio: var(--movie-poster-aspect);
            border: 2px solid rgba(255,255,255,0.16);
            border-radius: 14px;
            padding: 0;
            overflow: hidden;
            background: #111;
            cursor: pointer;
            opacity: 0.62;
            transform: scale(0.92);
            transition: opacity 0.25s ease, transform 0.25s ease, border-color 0.25s ease;
        }

        .hero-poster-card.active {
            opacity: 1;
            transform: scale(1);
            border-color: #fff;
            box-shadow: 0 18px 40px rgba(0,0,0,0.45);
        }

        .hero-poster-card img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .hero-title {
            font-size: clamp(3.2rem, 6vw, 5.6rem);
            font-weight: 800;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            line-height: 0.95;
        }

        .hero-overview {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            opacity: 0.9;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .hero-rating {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            border-left: 3px solid #e50914;
        }

        .hero-genre {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .btn-play {
            background: #e50914;
            border: none;
            color: white;
            padding: 0.7rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-play:hover {
            background: #b20710;
            transform: scale(1.02);
        }

        /* 主内容区 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 5% 4rem;
        }

        /* 分类按钮 */
        .genre-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
        }

        .genre-btn {
            background: transparent;
            border: none;
            color: #b3b3b3;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .genre-btn:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }
        .genre-btn.active {
            background: #e50914;
            color: white;
            box-shadow: 0 4px 12px rgba(229,9,20,0.3);
        }

        /* 影片推荐 */
        .movies-rail {
            position: relative;
        }

        .movies-grid {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            scroll-snap-type: x proximity;
            padding: 0.25rem 3.25rem 0.75rem;
            margin: 0 -3.25rem;
            scrollbar-width: none;
        }

        .movies-grid::-webkit-scrollbar {
            display: none;
        }

        .movie-card {
            flex: 0 0 180px;
            background: #1c1c1f;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s;
            animation: fadeInScale 0.4s ease forwards;
            scroll-snap-align: start;
        }
        .movie-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 15px 25px -10px rgba(0,0,0,0.6);
        }

        .poster-wrapper {
            aspect-ratio: var(--movie-poster-aspect);
            overflow: hidden;
            background: #111;
        }
        .poster {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.4s;
        }
        .movie-card:hover .poster {
            transform: scale(1.05);
        }

        .movie-info {
            padding: 0.8rem;
        }
        .movie-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-year {
            font-size: 0.7rem;
            color: #a3a3a3;
        }

        .continue-section {
            margin-bottom: 2rem;
        }

        .section-heading {
            font-size: 1.35rem;
            margin-bottom: 1rem;
            font-weight: 750;
        }

        .continue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.25rem;
        }

        .progress-meta {
            margin-top: 0.45rem;
            color: #e5e5e5;
            font-size: 0.72rem;
        }

        .rail-arrow {
            position: absolute;
            top: 50%;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 12px;
            color: #fff;
            background: rgba(0,0,0,0.68);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transform: translateY(-50%);
            transition: opacity 0.2s, background 0.2s, transform 0.2s;
            z-index: 5;
        }

        .rail-arrow:hover {
            background: rgba(229,9,20,0.82);
            transform: translateY(-50%) scale(1.04);
        }

        .rail-arrow:disabled {
            opacity: 0.32;
            cursor: default;
            transform: translateY(-50%);
        }

        .rail-arrow svg {
            width: 24px;
            height: 24px;
            display: block;
            fill: none;
            stroke: currentColor;
        }

        .rail-arrow-left {
            left: 0;
        }

        .rail-arrow-right {
            right: 0;
        }

        /* 播放器模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: rgba(0,0,0,0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
        }
        .modal.active {
            display: flex;
            animation: fadeIn 0.2s;
        }
        .modal-container {
            width: 90%;
            max-width: 1000px;
            max-height: calc(100dvh - 2rem);
            background: #000;
            border-radius: 16px;
            overflow: visible;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .modal-container:fullscreen {
            width: 100vw;
            height: 100vh;
            max-width: none;
            max-height: none;
            border-radius: 0;
        }
        .modal-container:fullscreen .video-wrapper {
            flex: 1 1 auto;
            max-height: none;
        }
        .video-wrapper {
            aspect-ratio: 16 / 9;
            width: 100%;
            max-height: calc(100dvh - 7rem);
            background: #000;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
            object-fit: contain;
        }
        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
            padding: 0 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
        }
        .modal-info {
            padding: 1rem;
            background: #111;
            font-size: 0.9rem;
        }
        .modal-player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            background: #0d0d0f;
            border-top: 1px solid rgba(255,255,255,0.1);
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .modal-container.controls-visible .modal-player-controls {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .modal-control-btn {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 12px;
            color: #fff;
            background: rgba(255,255,255,0.06);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }
        .modal-control-btn:hover {
            background: rgba(255,255,255,0.14);
            transform: translateY(-1px);
        }
        .modal-control-btn.primary {
            background: #e50914;
            border-color: #e50914;
        }
        .modal-control-btn.active {
            color: #ff4d57;
            border-color: rgba(229,9,20,0.55);
            background: rgba(229,9,20,0.12);
        }
        .modal-control-btn svg {
            width: 22px;
            height: 22px;
            display: block;
            fill: currentColor;
            stroke: currentColor;
        }

        /* 加载动画 */
        .loader {
            text-align: center;
            padding: 3rem;
            color: #aaa;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 768px) {
            .navbar {
                gap: 0.75rem;
                padding: 0.75rem 1rem;
            }
            .navbar > div:last-child {
                display: flex;
                gap: 0.5rem;
                flex: 0 0 auto;
            }
            .nav-actions {
                flex-wrap: wrap;
                justify-content: flex-end;
            }
            .search-input {
                order: -1;
                width: min(52vw, 220px);
                min-width: 150px;
                height: 38px;
                font-size: 0.82rem;
            }
            .hero {
                height: 76vh;
                min-height: 520px;
                max-height: none;
                aspect-ratio: auto;
            }
            .hero-backdrop {
                object-position: center;
            }
            .hero-title {
                font-size: 2.35rem;
            }
            .hero-overview {
                font-size: 0.8rem;
                line-clamp: 2;
                -webkit-line-clamp: 2;
            }
            .hero-content {
                bottom: 18%;
                left: 5%;
                right: 5%;
                max-width: none;
            }
            .hero-poster-rail {
                right: 5%;
                left: 5%;
                bottom: 2.8%;
                max-width: none;
                gap: 0.55rem;
            }
            .hero-poster-card {
                width: 58px;
                border-radius: 9px;
            }
            .movies-grid {
                gap: 1rem;
                padding-inline: 2.75rem;
                margin-inline: -2.75rem;
            }
            .movie-card {
                flex-basis: 140px;
            }
            .rail-arrow {
                width: 38px;
                height: 38px;
                border-radius: 10px;
            }
            .genre-btn {
                font-size: 0.8rem;
                padding: 0.3rem 1rem;
            }
            .logo {
                gap: 8px;
                flex: 1 1 auto;
                min-width: 0;
            }
            .logo-icon {
                width: 36px;
                height: 36px;
                flex-basis: 36px;
                font-size: 20px;
            }
            .logo-brand {
                font-size: 1.2rem;
            }
            .logo-tagline {
                font-size: 0.6rem;
                display: none;
            }
            .nav-link {
                padding: 0.55rem 0.7rem;
                font-size: 0.82rem;
            }
            .share-link {
                margin-left: 0;
            }
            .modal {
                align-items: center;
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                padding: 0;
            }
            .modal-container {
                width: 100vw;
                height: auto;
                max-height: 100dvh;
                max-width: none;
                border-radius: 0;
                overflow: hidden;
                justify-content: center;
            }
            .video-wrapper {
                flex: 0 0 auto;
                width: 100vw;
                height: auto;
                min-height: 0;
                aspect-ratio: 16 / 9;
                max-height: none;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .close-modal {
                top: 0.5rem;
                right: 0.5rem;
                width: 40px;
                height: 40px;
                padding: 0;
                display: grid;
                place-items: center;
                background: rgba(0,0,0,0.75);
            }
            .modal-info {
                flex: 0 0 auto;
                max-height: 4.5rem;
                overflow: auto;
                padding-right: 3.5rem;
                padding-bottom: calc(1rem + env(safe-area-inset-bottom));
            }
            .modal-player-controls {
                flex: 0 0 auto;
                gap: 0.55rem;
                padding: 0.7rem;
            }
            .modal-control-btn {
                width: 40px;
                height: 40px;
                border-radius: 10px;
            }
            .modal-control-btn svg {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="logo" onclick="window.location.href='index.html'">
        <img class="logo-icon" src="logo.png" alt="鑫艺影像馆 logo">
        <div class="logo-text">
            <div class="logo-brand">鑫艺影像馆</div>
            <div class="logo-tagline">经典电影 · 自由分享</div>
        </div>
    </div>
    <div class="nav-actions">
        <input class="search-input" id="movieSearchInput" type="search" placeholder="搜索电影" aria-label="搜索电影">
        <a class="nav-link" href="live.html">直播入口</a>
        <a class="nav-link" href="favorites.html">我的收藏</a>
        <button class="nav-link share-link" id="shareSiteBtn" type="button">分享到朋友圈</button>
    </div>
</nav>

<div class="share-toast" id="shareToast" role="status" aria-live="polite"></div>

<section class="hero" id="heroSection">
    <img class="hero-backdrop" id="heroBackdrop" src="https://pub-c8dff8c2f0a44d65a2aa76008f27ed86.r2.dev/Circle_hb_h.png" alt="The Circus backdrop" fetchpriority="high">

    let currentMovies = [...moviesData];
    let currentHeroMovie = currentMovies[0];
    let currentHeroIndex = 0;
    let heroRotationTimer = null;
    let currentVideoPlayer = null;
    let currentModalMovie = null;
    let modalControlsTimer = null;
    let modalProgressCleanup = null;
    let activeGenre = 'all';
    let activeSearchQuery = '';
    const movieRail = document.getElementById('moviesGrid');
    const movieScrollLeft = document.getElementById('moviesScrollLeft');
    const movieScrollRight = document.getElementById('moviesScrollRight');
    const heroSection = document.getElementById('heroSection');
    const heroPosterRail = document.getElementById('heroPosterRail');
    const modalPlayBtn = document.getElementById('modalPlayBtn');
    const modalPauseBtn = document.getElementById('modalPauseBtn');
    const modalRewindBtn = document.getElementById('modalRewindBtn');
    const modalForwardBtn = document.getElementById('modalForwardBtn');
    const modalFullscreenBtn = document.getElementById('modalFullscreenBtn');
    const modalFavoriteBtn = document.getElementById('modalFavoriteBtn');
    const modalContainer = document.querySelector('.modal-container');
    const movieSearchInput = document.getElementById('movieSearchInput');

    // 分类映射
    function getGenreLabel(genre) {
        const map = { Comedy: "喜剧", Drama: "剧情", "Sci-Fi": "科幻", Horror: "恐怖", Action: "动作" };
        return map[genre] || genre;
    }

    function getMoviePlaybackSource(movie) {
        const hlsUrl = movie.hlsUrl && movie.hlsUrl.trim();
        if (hlsUrl) {
            return {
                url: hlsUrl,
                type: 'hls',
                fallbackUrl: movie.videoUrl || movie.fallbackVideoUrl || ''
            };
        }

        return {
            url: movie.videoUrl,
            type: 'auto',
            fallbackUrl: movie.fallbackVideoUrl || ''
        };
    }

	    function getProgressKey(movieId) {
	        return `progress_${movieId}`;
	    }

	    function getSavedProgress(movieId) {
	        const value = Number(localStorage.getItem(getProgressKey(movieId)) || 0);
	        return Number.isFinite(value) ? value : 0;
	    }

	    function formatProgressTime(seconds) {
	        const mins = Math.floor(seconds / 60);
	        const secs = Math.floor(seconds % 60);
	        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
	    }

	    function saveMovieProgress(movieId, video) {
	        if (!movieId || !Number.isFinite(video.currentTime)) return;
	        if (Number.isFinite(video.duration) && video.duration > 0 && video.duration - video.currentTime < 12) {
	            localStorage.removeItem(getProgressKey(movieId));
	            renderContinueWatching();
	            return;
	        }
	        if (video.currentTime >= 5) {
	            localStorage.setItem(getProgressKey(movieId), String(Math.floor(video.currentTime)));
	        }
	    }

	    function restoreMovieProgress(movieId, video) {
	        const saved = getSavedProgress(movieId);
	        if (saved < 5) return;
	        const applyProgress = () => {
	            if (!Number.isFinite(video.duration)) return;
	            if (saved < video.duration - 8) {
	                video.currentTime = saved;
	            }
	            video.removeEventListener('loadedmetadata', applyProgress);
	            video.removeEventListener('canplay', applyProgress);
	        };
	        video.addEventListener('loadedmetadata', applyProgress);
	        video.addEventListener('canplay', applyProgress);
	    }

	    function setupContinueWatching(movie, video) {
	        if (modalProgressCleanup) modalProgressCleanup();
	        const save = () => saveMovieProgress(movie.id, video);
	        const clear = () => {
	            localStorage.removeItem(getProgressKey(movie.id));
	            renderContinueWatching();
	        };
	        video.addEventListener('timeupdate', save);
	        video.addEventListener('pause', save);
	        video.addEventListener('ended', clear);
	        restoreMovieProgress(movie.id, video);
	        modalProgressCleanup = () => {
	            save();
	            video.removeEventListener('timeupdate', save);
	            video.removeEventListener('pause', save);
	            video.removeEventListener('ended', clear);
	            modalProgressCleanup = null;
	            renderContinueWatching();
	        };
	    }

    // 渲染分类按钮
    function renderGenreFilter() {
        const genres = [...new Set(moviesData.map(m => m.genre))];
        const container = document.getElementById('genreFilterContainer');
        container.innerHTML = '<button class="genre-btn active" data-genre="all">全部</button>';
        genres.forEach(g => {
            const btn = document.createElement('button');
            btn.className = 'genre-btn';
            btn.setAttribute('data-genre', g);
            btn.textContent = getGenreLabel(g);
            btn.addEventListener('click', () => filterByGenre(g));
            container.appendChild(btn);
        });
    }

    // 按分类筛选
    function filterByGenre(genre) {
        activeGenre = genre;
        // 更新按钮激活样式
        document.querySelectorAll('.genre-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-genre') === genre) btn.classList.add('active');
            if (genre === 'all' && btn.getAttribute('data-genre') === 'all') btn.classList.add('active');
        });
        applyMovieFilters();
    }

    function movieMatchesSearch(movie, query) {
        if (!query) return true;
        const haystack = [
            movie.title,
            movie.year,
            movie.genre,
            getGenreLabel(movie.genre),
            movie.director,
            movie.overview
        ].join(' ').toLowerCase();
        return haystack.includes(query);
    }

    function applyMovieFilters() {
        const query = activeSearchQuery.trim().toLowerCase();
        currentMovies = moviesData.filter(movie => {
            const matchesGenre = activeGenre === 'all' || movie.genre === activeGenre;
            return matchesGenre && movieMatchesSearch(movie, query);
        });
        renderMoviesGrid();
        renderHeroPosterRail();
        // 如果筛选后列表不为空，更新Hero为第一个电影
        if (currentMovies.length) setHeroMovie(currentMovies[0], 0);
        updateMovieRailButtons();
        startHeroRotation();
    }

    function updateMovieRailButtons() {
        const maxScroll = movieRail.scrollWidth - movieRail.clientWidth;
        const hasOverflow = maxScroll > 2;
        movieScrollLeft.disabled = !hasOverflow || movieRail.scrollLeft <= 2;
        movieScrollRight.disabled = !hasOverflow || movieRail.scrollLeft >= maxScroll - 2;
    }

    function scrollMovieRail(direction) {
        const distance = Math.max(movieRail.clientWidth * 0.75, 260);
        movieRail.scrollBy({ left: direction * distance, behavior: 'smooth' });
        window.setTimeout(updateMovieRailButtons, 320);
    }

    // 渲染电影网格
	    function renderMoviesGrid() {
	        const grid = document.getElementById('moviesGrid');
        if (!currentMovies.length) {
            grid.innerHTML = '<div class="loader">🎬 暂无此分类影片，我们会陆续添加更多经典。</div>';
            updateMovieRailButtons();
            return;
        }
        let html = '';
        currentMovies.forEach((movie, idx) => {
            html += `
                <div class="movie-card" data-movie-id="${movie.id}">
                    <div class="poster-wrapper">
                        <img class="poster" src="${movie.poster}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/300x450?text=Classic&bg=111111&fg=ffffff'">
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-year">${movie.year} · ${getGenreLabel(movie.genre)}</div>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;
        // Cloudflare Pages/GitHub Pages keep this as detail.html?id=1.
        // Avoid pseudo-static /movie/1 routes unless server rewrite rules are added.
        document.querySelectorAll('.movie-card').forEach(card => {
            const movieId = parseInt(card.getAttribute('data-movie-id'));
            card.addEventListener('click', () => {
                window.location.href = `detail.html?id=${movieId}`;
            });
        });
	        movieRail.scrollLeft = 0;
	        updateMovieRailButtons();
	    }

	    function renderContinueWatching() {
	        const section = document.getElementById('continueSection');
	        const grid = document.getElementById('continueGrid');
	        const movies = moviesData
	            .map(movie => ({ movie, progress: getSavedProgress(movie.id) }))
	            .filter(item => item.progress >= 5);

	        section.hidden = movies.length === 0;
	        if (!movies.length) {
	            grid.innerHTML = '';
	            return;
	        }

	        grid.innerHTML = movies.map(({ movie, progress }) => `
	            <div class="movie-card continue-card" data-continue-id="${movie.id}">
	                <div class="poster-wrapper">
	                    <img class="poster" src="${movie.poster}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/300x450?text=Classic&bg=111111&fg=ffffff'">
	                </div>
	                <div class="movie-info">
	                    <div class="movie-title">${movie.title}</div>
	                    <div class="movie-year">${movie.year} · ${getGenreLabel(movie.genre)}</div>
	                    <div class="progress-meta">已观看到 ${formatProgressTime(progress)}</div>
	                </div>
	            </div>
	        `).join('');

	        grid.querySelectorAll('.continue-card').forEach(card => {
	            const movieId = parseInt(card.getAttribute('data-continue-id'));
	            const movie = moviesData.find(item => item.id === movieId);
	            card.addEventListener('click', () => playMovie(movie));
	        });
	    }

    function goToMovieDetail(movie = currentHeroMovie) {
        if (!movie) return;
        // Keep query-string detail URLs for static hosting refresh compatibility.
        window.location.href = `detail.html?id=${movie.id}`;
    }

    function renderHeroPosterRail() {
        heroPosterRail.innerHTML = currentMovies.map((movie, idx) => `
            <button class="hero-poster-card" data-hero-index="${idx}" type="button" aria-label="推介 ${movie.title}">
                <img src="${movie.poster}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/300x450?text=Classic&bg=111111&fg=ffffff'">
            </button>
        `).join('');

        heroPosterRail.querySelectorAll('.hero-poster-card').forEach(card => {
            card.addEventListener('click', (event) => {
                event.stopPropagation();
                const idx = Number(card.getAttribute('data-hero-index'));
                const movie = currentMovies[idx];
                if (movie) {
                    setHeroMovie(movie, idx);
                    restartHeroRotation();
                }
            });
        });
    }

    function updateHeroPosterState() {
        heroPosterRail.querySelectorAll('.hero-poster-card').forEach(card => {
            card.classList.toggle('active', Number(card.getAttribute('data-hero-index')) === currentHeroIndex);
        });
    }

    function showNextHeroMovie() {
        if (!currentMovies.length) return;
        const nextIndex = (currentHeroIndex + 1) % currentMovies.length;
        setHeroMovie(currentMovies[nextIndex], nextIndex);
    }

    function startHeroRotation() {
        window.clearInterval(heroRotationTimer);
        heroRotationTimer = window.setInterval(showNextHeroMovie, 5200);
    }

    function restartHeroRotation() {
        startHeroRotation();
    }

    // 设置Hero Banner
    function setHeroMovie(movie, index = currentMovies.findIndex(item => item.id === movie.id)) {
        currentHeroMovie = movie;
        currentHeroIndex = Math.max(0, index);
        document.getElementById('heroTitle').innerText = movie.title;
        document.getElementById('heroOverview').innerText = movie.overview;
        document.getElementById('heroRating').innerHTML = movie.rating;
        document.getElementById('heroGenre').innerHTML = getGenreLabel(movie.genre);
        document.getElementById('heroBackdrop').src = movie.backdrop;
        updateHeroPosterState();
        // 替换播放按钮事件（避免重复绑定）
        const oldBtn = document.getElementById('heroPlayBtn');
        const newBtn = oldBtn.cloneNode(true);
        oldBtn.parentNode.replaceChild(newBtn, oldBtn);
        newBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            goToMovieDetail(movie);
        });
    }

    function showShareToast(message) {
        const toast = document.getElementById('shareToast');
        toast.textContent = message;
        toast.classList.add('show');
        window.clearTimeout(window.shareToastTimer);
        window.shareToastTimer = window.setTimeout(() => toast.classList.remove('show'), 4200);
    }

    function getFavoriteMovies() {
        try {
            return JSON.parse(localStorage.getItem('favoriteMovies') || '[]');
        } catch (error) {
            return [];
        }
    }

    function setFavoriteMovies(ids) {
        localStorage.setItem('favoriteMovies', JSON.stringify(ids));
    }

    function updateFavoriteButton(movieId) {
        const favorites = getFavoriteMovies();
        const isFavorite = favorites.includes(movieId);
        modalFavoriteBtn.classList.toggle('active', isFavorite);
        modalFavoriteBtn.setAttribute('aria-label', isFavorite ? '取消收藏' : '收藏');
        modalFavoriteBtn.setAttribute('title', isFavorite ? '取消收藏' : '收藏');
    }

    function toggleFavorite() {
        if (!currentModalMovie) return;
        const favorites = getFavoriteMovies();
        const isFavorite = favorites.includes(currentModalMovie.id);
        const nextFavorites = isFavorite
            ? favorites.filter(id => id !== currentModalMovie.id)
            : [...favorites, currentModalMovie.id];
        setFavoriteMovies(nextFavorites);
        updateFavoriteButton(currentModalMovie.id);
    }

    function seekModalVideo(seconds) {
        const video = document.getElementById('videoPlayer');
        if (!Number.isFinite(video.duration)) return;
        video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + seconds));
    }

    function playModalVideo() {
        const video = document.getElementById('videoPlayer');
        if (window.indexPlayer) {
            window.indexPlayer.play();
            return;
        }
        video.play();
    }

    function pauseModalVideo() {
        if (window.indexPlayer) {
            window.indexPlayer.pause();
            return;
        }
        document.getElementById('videoPlayer').pause();
    }

    function toggleModalFullscreen() {
        const video = document.getElementById('videoPlayer');
        if (!document.fullscreenElement) {
            if (modalContainer.requestFullscreen) {
                modalContainer.requestFullscreen();
            } else if (video.webkitEnterFullscreen) {
                video.webkitEnterFullscreen();
            }
        } else {
            document.exitFullscreen?.();
        }
    }

    function showModalControls() {
        modalContainer.classList.add('controls-visible');
        window.clearTimeout(modalControlsTimer);
        modalControlsTimer = window.setTimeout(() => {
            modalContainer.classList.remove('controls-visible');
        }, 5000);
    }

    function setupModalControlAutoHide() {
        ['mousemove', 'touchstart', 'click', 'keydown'].forEach(eventName => {
            modalContainer.addEventListener(eventName, showModalControls, { passive: true });
        });
        document.addEventListener('fullscreenchange', showModalControls);
    }

    movieScrollLeft.addEventListener('click', () => scrollMovieRail(-1));
	    movieScrollRight.addEventListener('click', () => scrollMovieRail(1));
	    movieRail.addEventListener('scroll', updateMovieRailButtons, { passive: true });
	    window.addEventListener('resize', updateMovieRailButtons);
	    movieSearchInput.addEventListener('input', (event) => {
	        activeSearchQuery = event.target.value;
	        applyMovieFilters();
	    });
	    heroSection.addEventListener('click', () => goToMovieDetail());
    heroSection.addEventListener('mouseenter', () => window.clearInterval(heroRotationTimer));
    heroSection.addEventListener('mouseleave', startHeroRotation);

    async function shareSite() {
        const movie = currentHeroMovie || moviesData[0];
        const shareData = {
            title: '鑫艺影像馆',
            text: `来鑫艺影像馆观看经典电影：${movie.title}`,
            url: window.location.href
        };

        if (navigator.share) {
            try {
                await navigator.share(shareData);
                return;
            } catch (error) {
                if (error.name === 'AbortError') return;
            }
        }

        try {
            await navigator.clipboard.writeText(shareData.url);
            showShareToast('链接已复制。打开微信朋友圈，粘贴链接即可分享。若在微信内浏览，也可以点右上角菜单分享到朋友圈。');
        } catch (error) {
            showShareToast('请复制当前页面地址，在微信朋友圈发布；若在微信内浏览，可点右上角菜单分享到朋友圈。');
        }
    }

    // 播放电影（模态框）
    function playMovie(movie) {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        currentModalMovie = movie;
        modal.classList.add('active');
        document.body.classList.add('modal-open');
        document.getElementById('modalMovieTitle').innerHTML = `<strong>${movie.title}</strong> (${movie.year}) · 免费观影`;
        updateFavoriteButton(movie.id);
        showModalControls();
        
        // 使用 StreamPlayer 初始化
        if (!window.indexPlayer) {
            window.indexPlayer = new StreamPlayer(video, {
                autoplay: true,
                hlsConfig: {
                    maxLoadingDelay: 4,
                    minAutoBitrate: 0,
                    maxAutoBitrate: 8000000,
                    startLevel: -1
                }
            });
        }
        
	        const source = getMoviePlaybackSource(movie);
	        window.indexPlayer.load(source.url, source.type, source.fallbackUrl);
	        setupContinueWatching(movie, video);
	    }

    // 关闭模态框
    function closeModal() {
        const modal = document.getElementById('videoModal');
        modal.classList.remove('active');
        document.body.classList.remove('modal-open');
        currentModalMovie = null;
        modalContainer.classList.remove('controls-visible');
	        window.clearTimeout(modalControlsTimer);
	        if (modalProgressCleanup) modalProgressCleanup();
	        
	        if (window.indexPlayer) {
            window.indexPlayer.pause();
            window.indexPlayer.dispose();
            window.indexPlayer = null;
        }
    }

    // 初始化
    function init() {
        renderGenreFilter();
	        currentMovies = [...moviesData];
        renderContinueWatching();
        applyMovieFilters();
        renderHeroPosterRail();
        setHeroMovie(moviesData[0], 0);
        startHeroRotation();
        // 模态关闭事件
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('videoModal')) closeModal();
        });
        document.getElementById('shareSiteBtn').addEventListener('click', shareSite);
        modalPlayBtn.addEventListener('click', playModalVideo);
        modalPauseBtn.addEventListener('click', pauseModalVideo);
        modalRewindBtn.addEventListener('click', () => seekModalVideo(-10));
        modalForwardBtn.addEventListener('click', () => seekModalVideo(10));
        modalFullscreenBtn.addEventListener('click', toggleModalFullscreen);
        modalFavoriteBtn.addEventListener('click', toggleFavorite);
        setupModalControlAutoHide();
    }

    init();
</script>
</body>
</html>
