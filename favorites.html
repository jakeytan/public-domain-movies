<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="鑫艺影像馆收藏影片。">
    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <title>我的收藏 - 鑫艺影像馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --movie-poster-aspect: 941 / 1672;
        }

        body {
            min-height: 100vh;
            background: #0f0f10;
            color: #fff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 5%;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 100%);
            border-bottom: 1px solid rgba(229, 9, 20, 0.3);
            backdrop-filter: blur(12px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: contain;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.4);
        }

        .logo-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #e50914 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-tagline {
            margin-top: 2px;
            color: #a3a3a3;
            font-size: 0.65rem;
            letter-spacing: 1px;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 999px;
            color: #fff;
            background: rgba(255,255,255,0.06);
            text-decoration: none;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .search-input {
            width: min(28vw, 260px);
            min-width: 180px;
            height: 42px;
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            padding: 0 1rem;
            font: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: #a8a8b2;
        }

        .search-input:focus {
            border-color: rgba(229,9,20,0.75);
            background: rgba(255,255,255,0.12);
        }

        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 7.5rem 5% 4rem;
        }

        .page-title {
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1;
            margin-bottom: 0.75rem;
        }

        .page-subtitle {
            color: #b6b6be;
            margin-bottom: 2rem;
        }

        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.35rem;
        }

        .movie-card {
            background: #1c1c1f;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            overflow: hidden;
        }

        .poster-wrapper {
            aspect-ratio: var(--movie-poster-aspect);
            background: #111;
            cursor: pointer;
        }

        .poster {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .movie-info {
            padding: 0.85rem;
        }

        .movie-title {
            font-size: 0.95rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-year {
            margin-top: 0.25rem;
            color: #a3a3a3;
            font-size: 0.75rem;
        }

        .progress-meta {
            margin-top: 0.5rem;
            color: #e5e5e5;
            font-size: 0.75rem;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.85rem;
        }

        .card-btn {
            flex: 1;
            border: 0;
            border-radius: 8px;
            padding: 0.65rem 0.7rem;
            color: #fff;
            background: #e50914;
            font-weight: 700;
            cursor: pointer;
        }

        .card-btn.secondary {
            background: rgba(255,255,255,0.1);
        }

        .empty-state {
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            color: #d7d7de;
        }

        @media (max-width: 640px) {
            .navbar {
                padding: 0.75rem 4%;
                gap: 0.75rem;
            }

            .nav-actions {
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .search-input {
                order: -1;
                width: min(52vw, 220px);
                min-width: 150px;
                height: 38px;
                font-size: 0.82rem;
            }

            .logo-brand {
                font-size: 1.1rem;
            }

            .logo-tagline {
                display: none;
            }

            .nav-link {
                padding: 0.62rem 0.75rem;
                font-size: 0.85rem;
            }

            .favorites-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.8rem;
            }
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="logo" onclick="window.location.href='index.html'">
        <img class="logo-icon" src="logo.png" alt="鑫艺影像馆 logo">
        <div>
            <div class="logo-brand">鑫艺影像馆</div>
            <div class="logo-tagline">经典电影 · 自由分享</div>
        </div>
    </div>
    <div class="nav-actions">
        <input class="search-input" id="favoriteSearchInput" type="search" placeholder="搜索电影" aria-label="搜索收藏电影">
        <a class="nav-link" href="index.html">返回首页</a>
    </div>
</nav>

<main class="page">
    <h1 class="page-title">我的收藏</h1>
    <p class="page-subtitle" id="favoriteCount">已收藏的经典影片</p>
    <div class="favorites-grid" id="favoritesGrid"></div>
</main>

<script>
    const moviesData = [
        {
            id: 1,
            title: "The Circus",
            year: 1928,
            genre: "Comedy",
            poster: "https://pub-c8dff8c2f0a44d65a2aa76008f27ed86.r2.dev/Circle_hb_s.png"
        },
        {
            id: 2,
            title: "All Quiet on the Western Front",
            year: 1930,
            genre: "Drama",
            poster: "https://pub-c8dff8c2f0a44d65a2aa76008f27ed86.r2.dev/posters/all_quiet_poster.jpg?v=20260524"
        },
        {
            id: 3,
            title: "Metropolis",
            year: 1927,
            genre: "Sci-Fi",
            poster: "https://pub-c8dff8c2f0a44d65a2aa76008f27ed86.r2.dev/posters/Metropolis_poster.jpg"
        },
        {
            id: 4,
            title: "Nosferatu",
            year: 1922,
            genre: "Horror",
            poster: "https://placehold.co/300x450?text=Nosferatu&bg=111111&fg=ffffff"
        },
        {
            id: 5,
            title: "Modern Times",
            year: 1936,
            genre: "Comedy",
            poster: "https://placehold.co/300x450?text=Modern+Times&bg=111111&fg=ffffff"
        },
        {
            id: 6,
            title: "Frankenstein",
            year: 1931,
            genre: "Horror",
            poster: "https://placehold.co/300x450?text=Frankenstein&bg=111111&fg=ffffff"
        },
        {
            id: 7,
            title: "The General",
            year: 1926,
            genre: "Action",
            poster: "https://placehold.co/300x450?text=The+General&bg=111111&fg=ffffff"
        }
    ];

    let activeSearchQuery = '';

    function getGenreLabel(genre) {
        const map = { Comedy: "喜剧", Drama: "剧情", "Sci-Fi": "科幻", Horror: "恐怖", Action: "动作" };
        return map[genre] || genre;
    }

    function getFavoriteMovies() {
        try {
            return JSON.parse(localStorage.getItem('favoriteMovies') || '[]');
        } catch (error) {
            return [];
        }
    }

    function setFavoriteMovies(ids) {
        localStorage.setItem('favoriteMovies', JSON.stringify(ids));
    }

    function getSavedProgress(movieId) {
        const value = Number(localStorage.getItem(`progress_${movieId}`) || 0);
        return Number.isFinite(value) ? value : 0;
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function goToDetail(movieId) {
        window.location.href = `detail.html?id=${movieId}`;
    }

    function removeFavorite(movieId) {
        const nextFavorites = getFavoriteMovies().filter(id => id !== movieId);
        setFavoriteMovies(nextFavorites);
        renderFavorites();
    }

    function movieMatchesSearch(movie, query) {
        if (!query) return true;
        const haystack = [
            movie.title,
            movie.year,
            movie.genre,
            getGenreLabel(movie.genre)
        ].join(' ').toLowerCase();
        return haystack.includes(query);
    }

    function renderFavorites() {
        const favoriteIds = getFavoriteMovies();
        const query = activeSearchQuery.trim().toLowerCase();
        const favorites = moviesData.filter(movie => favoriteIds.includes(movie.id) && movieMatchesSearch(movie, query));
        const grid = document.getElementById('favoritesGrid');
        const count = document.getElementById('favoriteCount');
        count.textContent = favoriteIds.length ? `已收藏 ${favoriteIds.length} 部影片` : '还没有收藏影片';

        if (!favorites.length) {
            grid.innerHTML = query
                ? '<div class="empty-state">没有找到匹配的收藏影片。</div>'
                : '<div class="empty-state">回到首页播放影片时，点爱心按钮即可加入收藏。</div>';
            return;
        }

        grid.innerHTML = favorites.map(movie => {
            const progress = getSavedProgress(movie.id);
            const progressText = progress >= 5 ? `<div class="progress-meta">继续观看 ${formatTime(progress)}</div>` : '';
            return `
                <article class="movie-card">
                    <div class="poster-wrapper" onclick="goToDetail(${movie.id})">
                        <img class="poster" src="${movie.poster}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/300x450?text=Classic&bg=111111&fg=ffffff'">
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-year">${movie.year} · ${getGenreLabel(movie.genre)}</div>
                        ${progressText}
                        <div class="card-actions">
                            <button class="card-btn" type="button" onclick="goToDetail(${movie.id})">打开</button>
                            <button class="card-btn secondary" type="button" onclick="removeFavorite(${movie.id})">取消收藏</button>
                        </div>
                    </div>
                </article>
            `;
        }).join('');
    }

    document.getElementById('favoriteSearchInput').addEventListener('input', (event) => {
        activeSearchQuery = event.target.value;
        renderFavorites();
    });

    renderFavorites();
</script>

</body>
</html>
