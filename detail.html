            background: #000;
            border-radius: 16px;
            overflow: visible;
            position: relative;

        .player-container {
            position: relative;
            width: 100%;
            background: #000;
        }

            background: #000;

            height: 100%;

            transform: translateY(10px);
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 10;
        }

        .player-container.controls-visible .player-controls {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* 进度条 */
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 10px;

        .progress-bar {
            height: 100%;
            background: #e50914;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;

        .buffer-bar {
            position: absolute;
            height: 100%;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            width: 0%;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;

            background: rgba(255,255,255,0.1);

        .time-display {
            color: #aaa;
            font-size: 12px;
            font-weight: 500;
            min-width: 60px;
        }

        /* 设置菜单 */
        .settings-menu {
            display: none;
            position: absolute;
            bottom: 100%;
            right: 0;
            background: rgba(30,30,30,0.95);
            border-radius: 8px;
            overflow: hidden;
            min-width: 150px;
            margin-bottom: 10px;
            z-index: 20;
        }

        .settings-menu.active {
            display: block;
        }

        .menu-item {
            padding: 10px 15px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background 0.2s;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item.active {
            color: #e50914;
            font-weight: 600;
        }

        /* 状态指示 */
        .player-status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #aaa;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 5;
            display: none;
        }

        .player-status.show {
            display: block;
        }

        .status-buffering::before {
            content: '⟳ ';
            color: #e50914;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
            padding: 0 10px;
            border-radius: 30px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

            .detail-actions {

            .player-container {

            }

            }

            }
            .close-modal {

        }
    </style>

    function getGenreLabel(genre) {
        const map = { Comedy: "喜剧", Drama: "剧情", "Sci-Fi": "科幻", Horror: "恐怖", Action: "动作" };
        return map[genre] || genre;
    }

    // 获取当前电影（从URL或localStorage）
    function getCurrentMovie() {
        const params = new URLSearchParams(window.location.search);
        const movieId = parseInt(params.get('id'));
        const movie = moviesData.find(m => m.id === movieId);
        return movie || moviesData[0];
    }

    function showShareToast(message) {
        const toast = document.getElementById('shareToast');
        toast.textContent = message;
        toast.classList.add('show');
        window.clearTimeout(window.shareToastTimer);
        window.shareToastTimer = window.setTimeout(() => toast.classList.remove('show'), 4200);
    }

    async function shareMovie(movie) {
        const shareUrl = `${window.location.origin}${window.location.pathname}?id=${movie.id}`;
        const shareData = {
            title: `${movie.title} - 鑫艺影像馆`,
            text: `来鑫艺影像馆观看经典电影：${movie.title}`,
            url: shareUrl
        };

        if (navigator.share) {
            try {
                await navigator.share(shareData);
                return;
            } catch (error) {
                if (error.name === 'AbortError') return;
            }
        }

        try {
            await navigator.clipboard.writeText(shareData.url);
            showShareToast('链接已复制。打开微信朋友圈，粘贴链接即可分享。若在微信内浏览，也可以点右上角菜单分享到朋友圈。');
        } catch (error) {
            showShareToast('请复制当前页面地址，在微信朋友圈发布；若在微信内浏览，可点右上角菜单分享到朋友圈。');
        }
    }

    function setShareMeta(movie) {
        const meta = {
            'description': movie.overview,
            'og:title': `${movie.title} - 鑫艺影像馆`,
            'og:description': movie.overview,
            'og:image': movie.backdrop
        };

        Object.entries(meta).forEach(([key, value]) => {
            const selector = key.startsWith('og:') ? `meta[property="${key}"]` : `meta[name="${key}"]`;
            const tag = document.querySelector(selector);
            if (tag) tag.setAttribute('content', value);
        });
    }

    let detailControlsTimer = null;
    let detailControlsAutoHideSetup = false;

    function showDetailPlayerControls() {
        const playerContainer = document.getElementById('playerContainer');
        playerContainer.classList.add('controls-visible');
        window.clearTimeout(detailControlsTimer);
        detailControlsTimer = window.setTimeout(() => {
            playerContainer.classList.remove('controls-visible');
        }, 5000);
    }

    function setupDetailControlAutoHide() {
        if (detailControlsAutoHideSetup) return;
        const playerContainer = document.getElementById('playerContainer');
        ['mousemove', 'touchstart', 'click', 'keydown'].forEach(eventName => {
            playerContainer.addEventListener(eventName, showDetailPlayerControls, { passive: true });
        });
        document.addEventListener('fullscreenchange', showDetailPlayerControls);
        detailControlsAutoHideSetup = true;
    }

    // 渲染详情页
    function renderDetail() {
        const movie = getCurrentMovie();
        document.getElementById('detailTitle').textContent = movie.title;
        document.getElementById('detailYear').textContent = movie.year;
        document.getElementById('detailGenre').textContent = getGenreLabel(movie.genre);
        document.getElementById('detailDirector').textContent = movie.director;
        document.getElementById('detailRating').textContent = movie.rating;
        document.getElementById('detailOverview').textContent = movie.overview;
        document.getElementById('detailCast').textContent = movie.cast;
        document.getElementById('detailBackdrop').src = movie.backdrop;
        document.getElementById('detailPoster').src = movie.poster;
        document.title = `${movie.title} - 鑫艺影像馆`;
        setShareMeta(movie);

        // 播放按钮
        document.getElementById('playBtn').addEventListener('click', () => playMovie(movie));
        document.getElementById('shareMovieBtn').addEventListener('click', () => shareMovie(movie));

        // 推荐电影（同类型）
        const recommendations = moviesData.filter(m => m.genre === movie.genre && m.id !== movie.id);
        renderRecommendations(recommendations);
    }

    function renderRecommendations(movies) {
    const grid = document.getElementById('recommendationsGrid');
    if (!movies.length) {
        grid.innerHTML = '<p style="color:#a3a3a3;font-size:0.95rem;">暂无同类型推荐电影</p>';
        return;
    }
    grid.innerHTML = movies.map(movie => `
        <div class="rec-card" onclick="goToDetail(${movie.id})">
            <img class="rec-poster" src="${movie.poster}" alt="${movie.title}">
            <div class="rec-info">
                <div class="rec-title">${movie.title}</div>
                <div class="rec-year">${movie.year}</div>
            </div>
        </div>
    `).join('');
}
    function playMovie(movie) {
    const modal = document.getElementById('videoModal');
    const video = document.getElementById('videoPlayer');
    modal.classList.add('active');
    document.body.classList.add('modal-open');
    setupDetailControlAutoHide();
    showDetailPlayerControls();

    // ---- 新增：处理独立音频（如果存在）----
    let audio = null;
    let syncTimer = null;

    // 移除可能残留的旧音频元素
    const oldAudio = document.getElementById('syncAudio');
    if (oldAudio) oldAudio.remove();

    if (movie.audioUrl) {
        audio = document.createElement('audio');
        audio.id = 'syncAudio';
        audio.src = movie.audioUrl;
        audio.preload = 'metadata';
        audio.style.display = 'none';
        modal.appendChild(audio);

        // 视频必须静音（避免原视频音轨干扰）
        video.muted = true;
    } else {
        video.muted = false;
    }

    // 同步播放辅助函数
    function startSync() {
        if (!audio || syncTimer) return;
        syncTimer = setInterval(() => {
            if (video.paused || audio.paused) return;
            const diff = Math.abs(video.currentTime - audio.currentTime);
            if (diff > 0.3) {
                // 以视频时间为准校准音频
                audio.currentTime = video.currentTime;
            }
        }, 200);
    }

    function stopSync() {
        if (syncTimer) {
            clearInterval(syncTimer);
            syncTimer = null;
        }
    }

    function onVideoPlay() {
        if (audio && audio.paused) audio.play().catch(e => console.warn);
        startSync();
    }
    function onVideoPause() {
        if (audio && !audio.paused) audio.pause();
        stopSync();
    }
    function onVideoSeek() {
        if (audio) audio.currentTime = video.currentTime;
    }
    function onAudioSeek() {
        if (video) video.currentTime = audio.currentTime;
    }

    if (audio) {
        video.addEventListener('play', onVideoPlay);
        video.addEventListener('pause', onVideoPause);
        video.addEventListener('seeked', onVideoSeek);
        audio.addEventListener('play', onVideoPlay);
        audio.addEventListener('pause', onVideoPause);
        audio.addEventListener('seeked', onAudioSeek);
    }

    // 保存清理函数，以便在关闭模态时移除事件和定时器
    const cleanupSync = () => {
        if (audio) {
            video.removeEventListener('play', onVideoPlay);
            video.removeEventListener('pause', onVideoPause);
            video.removeEventListener('seeked', onVideoSeek);
            audio.removeEventListener('play', onVideoPlay);
            audio.removeEventListener('pause', onVideoPause);
            audio.removeEventListener('seeked', onAudioSeek);
            audio.pause();
            audio.src = '';
            audio.remove();
        }
        stopSync();
    };
    // 将清理函数挂载到 window 上，供原 closeModal 调用
    window._cleanupSync = cleanupSync;
    // ---- 独立音频处理结束 ----

    // 使用 StreamPlayer 初始化播放器（原有逻辑，不变）
    if (!window.player) {
        window.player = new StreamPlayer(video, {
            autoplay: true,
            hlsConfig: {
                maxLoadingDelay: 4,
                minAutoBitrate: 0,
                maxAutoBitrate: 8000000,
                startLevel: -1
            }
        });

        setupPlayerControls();

        window.player.on('buffering', () => {
            showPlayerStatus('loading', '缓冲中...');
        });

        window.player.on('buffered', () => {
            hidePlayerStatus();
        });

        window.player.on('error', (error) => {
            console.error('播放错误:', error);
            showPlayerStatus('error', '播放失败，点击重试');
            const statusEl = document.getElementById('playerStatus');
            statusEl.style.cursor = 'pointer';
            statusEl.onclick = () => {
                if (window.player) {
                    window.player.load(movie.videoUrl, 'auto', movie.fallbackVideoUrl);
                }
            };
        });

        window.player.on('qualitychange', (data) => {
            console.log(`切换画质: ${data.height}p (${(data.bitrate / 1000000).toFixed(1)}Mbps)`);
        });
    }

    // 加载视频
    window.player.load(movie.videoUrl, 'auto', movie.fallbackVideoUrl);

    // 若有独立音频，同时启动音频
    if (audio) {
        audio.play().catch(e => console.warn('音频自动播放失败', e));
    }

    // 更新画质选项
    setTimeout(() => {
        const qualities = window.player.getQualityLevels();
        if (qualities.length > 0) {
            const qualityMenu = document.getElementById('qualityMenu');
            qualityMenu.innerHTML = qualities.map((q, idx) => `
                <div class="menu-item" onclick="window.player.setQuality(${q.level}); this.parentElement.classList.remove('active');">
                    ${q.height ? q.height + 'p' : 'Auto'} (${(q.bitrate / 1000000).toFixed(1)}Mbps)
                </div>
            `).join('');
        }
    }, 500);
}

    // 播放器控制
    function setupPlayerControls() {
        const video = document.getElementById('videoPlayer');
        const player = window.player;
        
        // 播放/暂停
        document.getElementById('playPauseBtn').addEventListener('click', () => {
            if (video.paused) {
                player.play();
            } else {
                player.pause();
            }
        });
        
        // 进度条
        document.getElementById('progressContainer').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            player.seek(percent * video.duration);
        });
        
        // 播放速度
        document.getElementById('speedBtn').addEventListener('click', () => {
            const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
            const currentIdx = speeds.indexOf(video.playbackRate);
            const nextSpeed = speeds[(currentIdx + 1) % speeds.length];
            player.setPlaybackRate(nextSpeed);
            document.getElementById('speedBtn').textContent = nextSpeed + 'x';
        });
        
        // 画质切换
        document.getElementById('qualityBtn').addEventListener('click', (e) => {
            const menu = document.getElementById('qualityMenu');
            menu.classList.toggle('active');
            e.stopPropagation();
        });
        
        // 全屏
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            player.requestFullscreen();
        });
        
        // 更新进度条
        player.on('progress', (data) => {
            const percent = data.percent;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('currentTime').textContent = formatTime(data.current);
            document.getElementById('duration').textContent = formatTime(data.duration);
            document.getElementById('playPauseBtn').textContent = video.paused ? '▶' : '⏸';
        });
        
        // 更新缓冲进度
        player.on('bufferprogress', (data) => {
            document.getElementById('bufferBar').style.width = data.percent + '%';
        });
        
        // 获取并显示画质选项
        const qualities = player.getQualityLevels();
        if (qualities.length > 0) {
            const qualityMenu = document.getElementById('qualityMenu');
            qualityMenu.innerHTML = qualities.map((q, idx) => `
                <div class="menu-item" onclick="window.player.setQuality(${q.level}); this.parentElement.classList.remove('active');">
                    ${q.height ? q.height + 'p' : 'Auto'} (${(q.bitrate / 1000000).toFixed(1)}Mbps)
                </div>
            `).join('');
        }
        
        // 关闭其他菜单
        document.addEventListener('click', (e) => {
            if (e.target.id !== 'qualityBtn') {
                document.getElementById('qualityMenu').classList.remove('active');
            }
        });
    }

    function formatTime(seconds) {
        if (!seconds || isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return mins + ':' + (secs < 10 ? '0' : '') + secs;
    }

    function showPlayerStatus(type, text) {
        const status = document.getElementById('playerStatus');
        status.className = 'player-status show status-' + type;
        status.textContent = text;
    }

    function hidePlayerStatus() {
        const status = document.getElementById('playerStatus');
        status.classList.remove('show');
    }

    function closeModal() {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        modal.classList.remove('active');
        document.body.classList.remove('modal-open');
        document.getElementById('playerContainer').classList.remove('controls-visible');
        window.clearTimeout(detailControlsTimer);
        
        if (window.player) {
            window.player.pause();
            window.player.dispose();
            window.player = null;
        }
        
        if (window._cleanupSync) {
            window._cleanupSync();
            window._cleanupSync = null;
        }  
    }

    function goHome() {
        window.location.href = 'index.html';
    }

    function goToDetail(movieId) {
        window.location.href = `detail.html?id=${movieId}`;
    }

    // 事件监听
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('videoModal')) closeModal();
    });

    // 初始化
    renderDetail();
</script>
