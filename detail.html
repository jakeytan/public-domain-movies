<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="鑫艺影像馆，经典电影自由分享平台。">
    <meta property="og:title" content="电影详情 - 鑫艺影像馆">
    <meta property="og:description" content="观看并分享经典电影。">
    <meta property="og:image" content="https://pub-c8dff8c2f0a44d65a2aa76008f27ed86.r2.dev/Circle_hb_h.png">
    <meta property="og:type" content="video.movie">
    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <title>电影详情 - 鑫艺影像馆</title>
    <!-- HLS.js 库 (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f10;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #fff;
        }

        body.modal-open {
            overflow: hidden;
            touch-action: none;
        }

        :root {
            --movie-poster-aspect: 941 / 1672;
            --movie-backdrop-aspect: 1448 / 1086;
            --subtitle-font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            --subtitle-font-size: 1rem;
            --subtitle-line-height: 0.95;
            --subtitle-bottom: 8%;
            --subtitle-offset: 0px;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(229, 9, 20, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            min-width: 0;
        }

        .logo:hover {
            transform: translateY(-2px);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            flex: 0 0 40px;
            display: block;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.4);
            transition: all 0.3s;
            object-fit: contain;
            background: transparent;
        }

        .logo:hover .logo-icon {
            transform: rotate(6deg) scale(1.05);
            box-shadow: 0 6px 16px rgba(229, 9, 20, 0.6);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .logo-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #e50914 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .logo:hover .logo-brand {
            font-size: 1.55rem;
        }

        .logo-tagline {
            font-size: 0.65rem;
            color: #a3a3a3;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
            white-space: nowrap;
        }

        .logo:hover .logo-tagline {
            color: #e50914;
        }

        .back-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.16);
            color: #fff;
            background: rgba(255,255,255,0.06);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.14);
            transform: translateY(-1px);
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        /* 详情容器 */
        .detail-container {
            margin-top: 70px;
        }

        /* 头部背景 */
        .detail-header {
            position: relative;
            aspect-ratio: var(--movie-backdrop-aspect);
            height: auto;
            max-height: 820px;
            min-height: 520px;
            overflow: hidden;
            background:
                radial-gradient(circle at 75% 20%, rgba(229,9,20,0.16), transparent 34%),
                #0f0f10;
        }

        .detail-backdrop {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.03);
            filter: brightness(0.46) contrast(1.05);
            z-index: 1;
        }

        .detail-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, rgba(15,15,16,0.92) 70%);
            z-index: 2;
        }

        .detail-hero-content {
            position: absolute;
            bottom: 2rem;
            left: 5%;
            right: 5%;
            z-index: 3;
            display: flex;
            gap: 2rem;
            align-items: flex-end;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.5rem 0;
        }

        .detail-poster {
            width: 220px;
            flex-shrink: 0;
            aspect-ratio: var(--movie-poster-aspect);
            border-radius: 16px;
            object-fit: cover;
            background: #111;
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
        }

        .detail-title-section {
            flex: 1;
            min-width: 240px;
            animation: fadeInUp 0.8s ease-out;
            padding: 1.4rem 1.5rem 1.6rem;
            border-radius: 24px;
            background: rgba(6, 6, 8, 0.62);
            backdrop-filter: blur(18px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        }

        .detail-title {
            font-size: 2.5rem;
            line-height: 1.02;
            font-weight: 800;
            margin-bottom: 0.6rem;
            max-width: 100%;
        }

        .detail-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            font-size: 0.95rem;
            align-items: center;
        }

        .detail-meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            min-width: 110px;
        }

        .detail-meta-label {
            color: #a3a3a3;
            font-size: 0.82rem;
            letter-spacing: 0.01em;
        }

        .detail-meta-value {
            color: #fff;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .detail-rating {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(229,9,20,0.18);
            border-left: 3px solid #e50914;
            padding: 0.65rem 1.1rem;
            border-radius: 999px;
            margin-bottom: 0.2rem;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .detail-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.4rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-play-large {
            background: #e50914;
            border: none;
            color: white;
            padding: 0.88rem 2.1rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, background 0.2s;
            min-width: 170px;
            box-shadow: 0 12px 30px rgba(229, 9, 20, 0.22);
        }
        .btn-play-large:hover {
            background: #b20710;
            transform: scale(1.02);
        }

        .btn-share {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn-share {
            min-width: 165px;
        }

        .btn-share:hover {
            background: rgba(255,255,255,0.22);
        }

        .share-toast {
            position: fixed;
            left: 50%;
            bottom: 2rem;
            transform: translateX(-50%) translateY(20px);
            max-width: min(90vw, 460px);
            background: rgba(24,24,28,0.96);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 14px;
            padding: 0.9rem 1.1rem;
            box-shadow: 0 16px 40px rgba(0,0,0,0.35);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 2000;
            line-height: 1.5;
            font-size: 0.92rem;
        }

        .share-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 内容区 */
        .detail-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 5%;
            display: grid;
            gap: 2.5rem;
        }

        .content-section {
            margin-bottom: 0;
            padding: 1.6rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .content-section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 1.36rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            letter-spacing: 0.01em;
        }

        .overview-text {
            line-height: 1.9;
            font-size: 1rem;
            color: #e3e3e3;
            margin-bottom: 1rem;
            max-width: 860px;
        }

        /* 推荐区 */
        .recommendations {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .rec-card {
            background: rgba(16,16,18,0.96);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
        }
        .rec-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.28);
            border-color: rgba(229,9,20,0.25);
        }

        .rec-poster {
            width: 100%;
            aspect-ratio: var(--movie-poster-aspect);
            object-fit: cover;
            background: #111;
        }

        .rec-info {
            padding: 0.7rem;
        }

        .rec-title {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.3rem;
        }

        .rec-year {
            font-size: 0.7rem;
            color: #a3a3a3;
        }

        /* 视频播放器 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: rgba(0,0,0,0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
        }
        .modal.active {
            display: flex;
            animation: fadeIn 0.2s;
        }
        .modal-container {
            width: 90%;
            max-width: 1000px;
            max-height: calc(100dvh - 2rem);
            background: #000;
            border-radius: 16px;
            overflow: visible;
            position: relative;
        }

        /* 播放器容器 */
        .player-container {
            position: relative;
            width: 100%;
            background: #000;
        }

        .video-wrapper {
            aspect-ratio: 16 / 9;
            width: 100%;
            max-height: calc(100dvh - 2rem);
            position: relative;
            background: #000;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            outline: none;
            display: block;
            object-fit: contain;
        }

        /* 字幕样式 */
        video::cue {
            color: #fff;
            font-family: var(--subtitle-font-family);
            font-size: var(--subtitle-font-size);
            line-height: var(--subtitle-line-height);
            white-space: pre-wrap;
            text-shadow: 0 0 12px rgba(0,0,0,0.9);
            background: rgba(0,0,0,0.35);
            padding: 0.08em 0.18em;
            transform: translateY(var(--subtitle-offset));
        }
        video::-webkit-media-text-track-display-container {
            bottom: var(--subtitle-bottom);
        }

        .menu-section {
            padding: 10px 15px 6px;
            color: rgba(255,255,255,0.75);
            font-size: 12px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            pointer-events: none;
        }

        .menu-item.selected {
            background: rgba(255,255,255,0.12);
        }

        /* 播放器控制条 */
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.9) 100%);
            padding: 20px 15px 10px;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 10;
        }

        .player-container.controls-visible .player-controls {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* 进度条 */
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 10px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: #e50914;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .buffer-bar {
            position: absolute;
            height: 100%;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            width: 0%;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .player-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .time-display {
            color: #aaa;
            font-size: 12px;
            font-weight: 500;
            min-width: 60px;
        }

        /* 设置菜单 */
        .settings-menu {
            display: none;
            position: absolute;
            bottom: 100%;
            right: 0;
            background: rgba(30,30,30,0.95);
            border-radius: 8px;
            overflow: hidden;
            min-width: 150px;
            margin-bottom: 10px;
            z-index: 20;
        }

        .settings-menu.active {
            display: block;
        }

        .menu-item {
            padding: 10px 15px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background 0.2s;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item.active {
            color: #e50914;
            font-weight: 600;
        }

        /* 状态指示 */
        .player-status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #aaa;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 5;
            display: none;
        }

        .player-status.show {
            display: block;
        }

        .status-buffering::before {
            content: '⟳ ';
            color: #e50914;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
            padding: 0 10px;
            border-radius: 30px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .navbar {
                gap: 0.6rem;
                padding: 0.75rem 1rem;
            }
            .navbar > div:first-child {
                flex: 1 1 auto;
            }
            .nav-link,
            .back-btn {
                padding: 0.5rem 0.65rem;
                font-size: 0.8rem;
                white-space: nowrap;
            }
            .detail-header {
                height: 560px;
                min-height: 560px;
                max-height: none;
                aspect-ratio: var(--movie-backdrop-aspect);
            }
            .detail-hero-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .detail-poster {
                width: 140px;
            }
            .detail-title {
                font-size: 1.8rem;
            }
            .detail-meta {
                justify-content: center;
                gap: 1rem;
            }
            .detail-actions {
                justify-content: center;
            }
            .recommendations {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
            .logo {
                gap: 8px;
                min-width: 0;
            }
            .logo-icon {
                width: 36px;
                height: 36px;
                flex-basis: 36px;
                font-size: 20px;
            }
            .logo-brand {
                font-size: 1.2rem;
            }
            .logo-tagline {
                font-size: 0.6rem;
                display: none;
            }
            .modal {
                align-items: center;
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                padding: 0;
            }
            .modal-container {
                width: 100vw;
                height: auto;
                max-height: 100dvh;
                max-width: none;
                border-radius: 0;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .player-container {
                flex: 0 0 auto;
                width: 100vw;
                min-width: 0;
                min-height: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .video-wrapper {
                flex: 1 1 auto;
                width: 100%;
                height: auto;
                min-width: 0;
                min-height: 0;
                aspect-ratio: 16 / 9;
                max-height: none;
            }
            .player-controls {
                padding: 16px 10px calc(10px + env(safe-area-inset-bottom));
            }
            .controls {
                gap: 6px;
                min-width: 0;
            }
            .controls-left {
                gap: 4px;
                min-width: 0;
            }
            .player-btn {
                font-size: 16px;
                padding: 5px 7px;
            }
            .time-display {
                min-width: auto;
                font-size: 11px;
                white-space: nowrap;
            }
            .close-modal {
                top: 0.5rem;
                right: 0.5rem;
                width: 40px;
                height: 40px;
                padding: 0;
                display: grid;
                place-items: center;
                background: rgba(0,0,0,0.75);
            }
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="logo" onclick="goHome()">
        <img class="logo-icon" src="logo.png" alt="鑫艺影像馆 logo">
        <div class="logo-text">
            <div class="logo-brand">鑫艺影像馆</div>
            <div class="logo-tagline">经典电影 · 自由分享</div>
        </div>
    </div>
    <div>
        <a class="nav-link" href="live.html">直播入口</a>
        <a class="nav-link" href="favorites.html">我的收藏</a>
    </div>
    <button class="back-btn" onclick="goHome()">← 返回首页</button>
</nav>

<div class="detail-container">
    <!-- 头部 -->
    <div class="detail-header">
        <img class="detail-backdrop" id="detailBackdrop" src="" alt="backdrop">
        <div class="detail-overlay"></div>
        <div class="detail-hero-content">
            <img class="detail-poster" id="detailPoster" src="" alt="poster">
            <div class="detail-title-section">
                <h1 class="detail-title" id="detailTitle">加载中...</h1>
                <div class="detail-meta">
                    <div class="detail-meta-item">
                        <div class="detail-meta-label">年份</div>
                        <div class="detail-meta-value" id="detailYear">-</div>
                    </div>
                    <div class="detail-meta-item">
                        <div class="detail-meta-label">类型</div>
                        <div class="detail-meta-value" id="detailGenre">-</div>
                    </div>
                    <div class="detail-meta-item">
                        <div class="detail-meta-label">导演</div>
                        <div class="detail-meta-value" id="detailDirector">-</div>
                    </div>
                </div>
                <div class="detail-rating" id="detailRating">⭐⭐⭐⭐⭐ 9.0</div>
                <div class="detail-actions">
                    <button class="btn-play-large" id="playBtn">▶ 立即播放</button>
                    <button class="btn-share" id="shareMovieBtn" type="button">分享到朋友圈</button>
                </div>
            </div>
        </div>
    </div>

    <div class="share-toast" id="shareToast" role="status" aria-live="polite"></div>

    <!-- 内容 -->
    <div class="detail-content">
        <!-- 剧情简介 -->
        <div class="content-section">
            <h2 class="section-title">📖 剧情简介</h2>
            <p class="overview-text" id="detailOverview"></p>
        </div>

        <!-- 演员信息 -->
        <div class="content-section">

                            <div class="settings-menu" id="qualityMenu"></div>

                            <div class="settings-menu" id="subtitleMenu"></div>

<script src="player.js?v=20260531-decode-fix"></script>
<script src="movies-data.js"></script>
<script>
    const fontItems = fonts.map(font => {
        const selected = window.subtitleStyleState.fontFamily === font.value ? 'selected' : '';
        return `<div class="menu-item ${selected}" onclick="window.setSubtitleFontFamily('${font.value}'); this.parentElement.classList.remove('active');">${font.label}</div>`;
    }).join('');
    const sizeItems = sizes.map(size => {
        const selected = window.subtitleStyleState.fontSize === size.value ? 'selected' : '';
        return `<div class="menu-item ${selected}" onclick="window.setSubtitleFontSize('${size.value}'); this.parentElement.classList.remove('active');">${size.label}</div>`;
    }).join('');
    const positionItems = positions.map(pos => {
        const selected = window.subtitleStyleState.position === pos.value ? 'selected' : '';
        return `<div class="menu-item ${selected}" onclick="window.setSubtitlePosition('${pos.value}'); this.parentElement.classList.remove('active');">${pos.label}</div>`;
    }).join('');

    menu.innerHTML = `
        <div class="menu-section">字幕轨</div>
        ${trackItems}
        <div class="menu-section">显示</div>
        ${visibilityItems}
        <div class="menu-section">字体</div>
        ${fontItems}
        <div class="menu-section">大小</div>
        ${sizeItems}
        <div class="menu-section">位置</div>
        ${positionItems}
    `;
}

    // 播放器控制
    function setupPlayerControls() {
        const video = document.getElementById('videoPlayer');
        const player = window.player;

        // 禁止视频右键下载
        video.addEventListener('contextmenu', (e) => e.preventDefault());
        video.setAttribute('controlsList', 'nodownload');
        
        // 播放/暂停
        document.getElementById('playPauseBtn').addEventListener('click', () => {
            if (video.paused) {
                player.play();
            } else {
                player.pause();
            }
        });
        
        // 进度条
        document.getElementById('progressContainer').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            player.seek(percent * video.duration);
        });
        
        // 播放速度
        document.getElementById('speedBtn').addEventListener('click', () => {
            const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
            const currentIdx = speeds.indexOf(video.playbackRate);
            const nextSpeed = speeds[(currentIdx + 1) % speeds.length];
            player.setPlaybackRate(nextSpeed);
            document.getElementById('speedBtn').textContent = nextSpeed + 'x';
        });
        
        // 画质切换
        document.getElementById('qualityBtn').addEventListener('click', (e) => {
            const menu = document.getElementById('qualityMenu');
            document.getElementById('subtitleMenu').classList.remove('active');
            menu.classList.toggle('active');
            e.stopPropagation();
        });
        document.getElementById('subtitleBtn').addEventListener('click', (e) => {
            const menu = document.getElementById('subtitleMenu');
            document.getElementById('qualityMenu').classList.remove('active');
            menu.classList.toggle('active');
            renderSubtitleMenu();
            e.stopPropagation();
        });
        
        // 全屏
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            player.requestFullscreen();
        });
        
        // 更新进度条
        player.on('progress', (data) => {
            const percent = data.percent;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('currentTime').textContent = formatTime(data.current);
            document.getElementById('duration').textContent = formatTime(data.duration);
            document.getElementById('playPauseBtn').textContent = video.paused ? '▶' : '⏸';
        });
        
        // 更新缓冲进度
        player.on('bufferprogress', (data) => {
            document.getElementById('bufferBar').style.width = data.percent + '%';
        });
        
        // 获取并显示画质选项
        renderQualityMenu(player.getQualityLevels());
        
        // 关闭其他菜单
        document.addEventListener('click', (e) => {
            if (e.target.id !== 'qualityBtn' && e.target.id !== 'subtitleBtn') {
                document.getElementById('qualityMenu').classList.remove('active');
                document.getElementById('subtitleMenu').classList.remove('active');
            }
        });
    }

    function formatTime(seconds) {
        if (!seconds || isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return mins + ':' + (secs < 10 ? '0' : '') + secs;
    }

    function showPlayerStatus(type, text) {
        const status = document.getElementById('playerStatus');
        status.className = 'player-status show status-' + type;
        status.textContent = text;
    }

    function hidePlayerStatus() {
        const status = document.getElementById('playerStatus');
        status.classList.remove('show');
        status.style.cursor = '';
        status.onclick = null;
    }

    function closeModal() {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        modal.classList.remove('active');
        document.body.classList.remove('modal-open');
        document.getElementById('playerContainer').classList.remove('controls-visible');
        window.clearTimeout(detailControlsTimer);
        if (detailProgressCleanup) detailProgressCleanup();
        
        if (window.player) {
            window.player.pause();
            window.player.dispose();
            window.player = null;
        }
        
        if (window._cleanupSync) {
            window._cleanupSync();
            window._cleanupSync = null;
        }  
    }

    function goHome() {
        window.location.href = 'index.html';
    }

    function goToDetail(movieId) {
        // Keep query-string detail URLs for static hosting refresh compatibility.
        window.location.href = `detail.html?id=${movieId}`;
    }

    // 事件监听
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('videoModal')) closeModal();
    });

    // 初始化
    renderDetail();
</script>
