<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <title>直播入口 - 鑫艺影像馆</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #09090b;
            color: #f2f2f2;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 1rem max(5%, env(safe-area-inset-left)) 1rem max(5%, env(safe-area-inset-right));
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(229, 9, 20, 0.25);
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 0;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            flex: 0 0 40px;
            display: block;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            object-fit: contain;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .logo-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #e50914 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
        }

        .logo-tagline {
            font-size: 0.7rem;
            color: #a3a3a3;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.16);
            color: #fff;
            background: rgba(255,255,255,0.06);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.14);
            transform: translateY(-1px);
        }

        main {
            margin-top: 88px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            padding: clamp(1rem, 2.4vw, 2rem) 5% 2.5rem;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 1.5rem;
            align-items: center;
            margin-top: 2rem;
        }

        .hero-copy {
            padding: 2rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 26px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .hero-copy .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(229,9,20,0.15);
            color: #ffb3b3;
            padding: 0.45rem 0.9rem;
            border-radius: 999px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .hero-copy h1 {
            font-size: clamp(2rem, 4vw, 3.2rem);
            margin-bottom: 1rem;
            line-height: 1.05;
        }

        .hero-copy p {
            color: #d4d4d8;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .hero-copy .btn-play {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }

        .hero-sidebar {
            display: grid;
            gap: 1rem;
        }

        .status-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 1.5rem;
            min-height: 220px;
        }

        .status-card h3 {
            margin-bottom: 1rem;
            color: #fff;
            font-size: 1rem;
        }

        .status-card p {
            color: #c0c0c8;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .status-key {
            display: inline-block;
            margin-top: 1rem;
            color: #e50914;
            font-weight: 700;
        }

        .player-section {
            display: grid;
            grid-template-columns: minmax(0, 2.1fr) minmax(300px, 0.9fr);
            gap: 1.5rem;
            align-items: start;
        }

        .player-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            min-width: 0;
        }

        .player-card header {
            padding: clamp(1rem, 2vw, 1.5rem);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .player-card header h2 {
            font-size: 1.25rem;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            min-height: 220px;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .player-status {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            font-size: 0.85rem;
        }

        .player-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem clamp(1rem, 2vw, 1.5rem) clamp(1rem, 2vw, 1.5rem);
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .player-actions .btn-secondary,
        .player-actions .btn-secondary:hover {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
        }

        .btn-secondary {
            border-radius: 999px;
            padding: 0.8rem 1rem;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.95rem;
            min-height: 44px;
        }

        .live-side {
            display: grid;
            gap: 1rem;
            min-width: 0;
            position: sticky;
            top: 104px;
        }

        .channel-list {
            display: grid;
            gap: 1rem;
        }

        .channel-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 1.2rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .channel-card:hover,
        .channel-card.active {
            border-color: #e50914;
            background: rgba(229,9,20,0.12);
        }

        .channel-card h3 {
            margin-bottom: 0.6rem;
            font-size: 1rem;
        }

        .channel-card p {
            color: #c0c0c8;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .schedule {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 1.5rem;
        }

        .schedule h3 {
            margin-bottom: 1rem;
        }

        .schedule-item {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.9rem;
            color: #d0d0d8;
            font-size: 0.95rem;
        }

        .schedule-item:last-child {
            margin-bottom: 0;
        }

        .schedule-item span:first-child {
            color: #fff;
            min-width: 90px;
            font-weight: 600;
        }

        @media (max-width: 980px) {
            .hero,
            .player-section {
                grid-template-columns: 1fr;
            }

            .hero {
                margin-top: 1.5rem;
            }

            .live-side {
                position: static;
            }
        }

        @media (max-width: 680px) {
            .navbar {
                padding: 0.75rem 1rem;
                gap: 0.75rem;
            }
            main {
                margin-top: 74px;
                padding: 0.9rem 0.9rem 1.75rem;
            }
            .logo-brand {
                font-size: 1.2rem;
            }
            .logo {
                flex: 1 1 auto;
                min-width: 0;
            }
            .logo-icon {
                width: 36px;
                height: 36px;
                flex-basis: 36px;
            }
            .logo-tagline {
                display: none;
            }
            .nav-link {
                padding: 0.55rem 0.7rem;
                font-size: 0.82rem;
                white-space: nowrap;
            }
            .player-card,
            .schedule,
            .status-card,
            .hero-copy {
                border-radius: 18px;
            }
            .player-card header {
                align-items: flex-start;
                flex-direction: column;
            }
            .video-wrapper {
                min-height: 0;
            }
            .player-status {
                right: 0.75rem;
                bottom: 0.75rem;
                max-width: calc(100% - 1.5rem);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                font-size: 0.78rem;
            }
            .hero-copy {
                padding: 1.25rem;
            }
            .hero-copy h1 {
                font-size: 1.75rem;
            }
            .hero-copy p {
                margin-bottom: 0;
            }
            .hero-copy .btn-play {
                display: none;
            }
            .hero-sidebar {
                grid-template-columns: 1fr;
            }
            .status-card {
                min-height: 0;
                padding: 1.2rem;
            }
            .player-actions {
                display: grid;
                grid-template-columns: 1fr;
                align-items: stretch;
                padding: 0.9rem;
            }
            .channel-list {
                display: flex;
                gap: 0.75rem;
                margin-inline: -0.9rem;
                padding: 0 0.9rem 0.2rem;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
            }
            .channel-card {
                flex: 0 0 78%;
                scroll-snap-align: start;
                padding: 1rem;
            }
            .schedule {
                padding: 1.2rem;
            }
            .schedule-item {
                display: grid;
                grid-template-columns: 4rem 1fr;
                gap: 0.35rem 0.75rem;
            }
            .schedule-item span:last-child {
                grid-column: 2;
                color: #a8a8b2;
            }
        }

        @media (min-width: 981px) {
            .player-card {
                min-height: calc(100vh - 148px);
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo" onclick="window.location.href='index.html'">
        <img class="logo-icon" src="logo.png" alt="鑫艺影像馆 logo">
        <div class="logo-text">
            <div class="logo-brand">鑫艺影像馆</div>
            <div class="logo-tagline">经典电影 · 自由分享</div>
        </div>
    </div>
    <div>
        <a class="nav-link" href="index.html">返回首页</a>
    </div>
</nav>
<main>
    <section class="player-section" aria-label="直播影片">
        <div class="player-card">
            <header>
                <h2>直播播放器</h2>
                <div id="liveChannelName">频道 A</div>
            </header>
            <div class="video-wrapper">
                <video id="livePlayer" controls playsinline></video>
                <div class="player-status" id="liveStatus">等待连接...</div>
            </div>
            <div class="player-actions">
                <button class="btn-secondary" id="playPauseBtn">播放 / 暂停</button>
                <button class="btn-secondary" id="refreshBtn">刷新流</button>
                <button class="btn-secondary" id="joinBtn">加入直播</button>
            </div>
        </div>
        <div class="live-side">
            <div class="channel-list" id="channelList"></div>
            <div class="schedule">
                <h3>直播节目表</h3>
                <div id="scheduleList"></div>
            </div>
        </div>
    </section>

    <section class="hero">
        <div class="hero-copy">
            <div class="live-badge">LIVE 实时推流</div>
            <h1>电影直播间</h1>
            <p>实时切换直播频道，支持 HLS 播放和频道预告。未来可接入 RTMP/WebRTC 推流，实现真正的在线电影直播。</p>
            <a class="btn-play" href="#livePlayer">进入直播</a>
        </div>
        <div class="hero-sidebar">
            <div class="status-card">
                <h3>当前节目</h3>
                <p id="currentShow">经典电影巡礼 - 立即播放中</p>
                <span class="status-key">频道状态：在线</span>
            </div>
            <div class="status-card">
                <h3>推荐观看</h3>
                <p>本频道正在直播经典电影精选，支持即时调度、直播预告和实时播放。</p>
                <span class="status-key">已接入 HLS 实时播放</span>
            </div>
        </div>
    </section>
</main>
<script src="player.js"></script>
<script>
    const liveChannels = [
        {
            id: 1,
            name: '经典电影频道',
            description: '经典电影实时播放',
            stream: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8'
        },
        {
            id: 2,
            name: '艺术大片频道',
            description: '沉浸式艺术影片实时连播',
            stream: 'https://test-streams.mux.dev/pts_shift/master.m3u8'
        },
        {
            id: 3,
            name: '纪录片频道',
            description: '纪录片夜间直播',
            stream: 'https://test-streams.mux.dev/4v3p6f8w/master.m3u8'
        }
    ];

    const programSchedule = [
        { time: '20:00', title: '经典电影巡礼', channel: '经典电影频道' },
        { time: '21:30', title: '艺术影像展映', channel: '艺术大片频道' },
        { time: '23:00', title: '纪录片夜聊', channel: '纪录片频道' }
    ];

    const video = document.getElementById('livePlayer');
    const liveStatus = document.getElementById('liveStatus');
    const liveChannelName = document.getElementById('liveChannelName');
    const currentShow = document.getElementById('currentShow');
    const channelList = document.getElementById('channelList');
    const scheduleList = document.getElementById('scheduleList');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const joinBtn = document.getElementById('joinBtn');

    let streamPlayer = null;
    let activeChannel = liveChannels[0];

    function renderChannels() {
        channelList.innerHTML = liveChannels.map(channel => `
            <div class="channel-card" data-id="${channel.id}">
                <h3>${channel.name}</h3>
                <p>${channel.description}</p>
            </div>
        `).join('');

        document.querySelectorAll('.channel-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = Number(card.getAttribute('data-id'));
                const channel = liveChannels.find(item => item.id === id);
                if (channel) {
                    selectChannel(channel);
                }
            });
        });
    }

    function renderSchedule() {
        scheduleList.innerHTML = programSchedule.map(item => `
            <div class="schedule-item">
                <span>${item.time}</span>
                <span>${item.title}</span>
                <span>${item.channel}</span>
            </div>
        `).join('');
    }

    function setupPlayer() {
        streamPlayer = new StreamPlayer(video, {
            autoplay: false,
            hlsConfig: {
                maxLoadingDelay: 4,
                maxAutoBitrate: 8000000,
                minAutoBitrate: 0,
                startLevel: -1
            }
        });

        streamPlayer.on('loading', () => setLiveStatus('正在连接直播源...'));
        streamPlayer.on('buffering', () => setLiveStatus('缓冲中...'));
        streamPlayer.on('buffered', () => setLiveStatus('直播流已就绪'));
        streamPlayer.on('play', () => setLiveStatus('正在播放'));
        streamPlayer.on('pause', () => setLiveStatus('已暂停'));
        streamPlayer.on('error', () => setLiveStatus('直播源异常，正在重试...'));
        streamPlayer.on('qualitychange', data => {
            setLiveStatus(`已切换至 ${data.height || '自动'} 画质`);
        });
    }

    function setLiveStatus(text) {
        liveStatus.textContent = text;
    }

    function selectChannel(channel) {
        activeChannel = channel;
        liveChannelName.textContent = channel.name;
        currentShow.textContent = `${channel.description} - 直播中`;
        document.querySelectorAll('.channel-card').forEach(card => {
            card.classList.toggle('active', Number(card.getAttribute('data-id')) === channel.id);
        });
        loadStream(channel.stream);
    }

    function loadStream(url) {
        if (!streamPlayer) return;
        streamPlayer.load(url, 'hls');
        setLiveStatus('直播源加载中...');
    }

    playPauseBtn.addEventListener('click', () => {
        if (video.paused) {
            streamPlayer.play();
            setLiveStatus('继续播放');
        } else {
            streamPlayer.pause();
        }
    });

    refreshBtn.addEventListener('click', () => {
        setLiveStatus('正在刷新播放流...');
        loadStream(activeChannel.stream);
    });

    joinBtn.addEventListener('click', () => {
        streamPlayer.play();
        setLiveStatus('已加入直播，正在播放');
    });

    window.addEventListener('load', () => {
        renderChannels();
        renderSchedule();
        setupPlayer();
        selectChannel(activeChannel);
    });
</script>
</body>
</html>
