<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <title>直播入口 - 鑫艺影像馆</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #09090b;
            color: #f2f2f2;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 1rem max(5%, env(safe-area-inset-left)) 1rem max(5%, env(safe-area-inset-right));
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(229, 9, 20, 0.25);
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 0;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            flex: 0 0 40px;
            display: block;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            object-fit: contain;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .logo-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #e50914 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
        }

        .logo-tagline {
            font-size: 0.7rem;
            color: #a3a3a3;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.16);
            color: #fff;
            background: rgba(255,255,255,0.06);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.14);
            transform: translateY(-1px);
        }

        main {
            margin-top: 88px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            padding: clamp(1rem, 2.4vw, 2rem) 5% 2.5rem;
        }

        .player-section {
            display: grid;
            grid-template-columns: minmax(0, 2.1fr) minmax(300px, 0.9fr);
            gap: 1.5rem;
            align-items: start;
        }

        .player-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            min-width: 0;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            min-height: 220px;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .live-window-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            width: 0.82rem;
            height: 0.82rem;
            border-radius: 50%;
            background: #e50914;
            box-shadow: 0 0 0 4px rgba(229,9,20,0.2), 0 0 18px rgba(229,9,20,0.9);
        }

        .player-status {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
            clip-path: inset(50%);
            white-space: nowrap;
        }

        .player-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem;
            gap: 0.7rem;
            flex-wrap: wrap;
            background: rgba(12,12,14,0.96);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .player-actions .btn-secondary,
        .player-actions .btn-secondary:hover {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
        }

        .btn-secondary {
            width: 46px;
            height: 46px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            padding: 0;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
            min-height: 46px;
        }

        .btn-secondary:hover {
            transform: translateY(-1px);
        }

        .btn-secondary:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
        }

        .btn-secondary.primary-action {
            background: #e50914;
            border-color: #e50914;
            color: #fff;
        }

        .btn-secondary svg {
            width: 22px;
            height: 22px;
            display: block;
            fill: currentColor;
            stroke: currentColor;
        }

        .player-card:fullscreen {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border: 0;
            border-radius: 0;
            background: #000;
        }

        .player-card:fullscreen .video-wrapper {
            flex: 1 1 auto;
            min-height: 0;
            aspect-ratio: auto;
        }

        .player-card:fullscreen .player-actions {
            flex: 0 0 auto;
        }

        .live-side {
            display: grid;
            gap: 1rem;
            min-width: 0;
            position: sticky;
            top: 104px;
        }

        .channel-list {
            display: grid;
            gap: 1rem;
        }

        .channel-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 1.2rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .channel-card:hover,
        .channel-card.active {
            border-color: #e50914;
            background: rgba(229,9,20,0.12);
        }

        .channel-card h3 {
            margin-bottom: 0.6rem;
            font-size: 1rem;
        }

        .channel-card p {
            color: #c0c0c8;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .schedule {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 1.5rem;
        }

        .schedule h3 {
            margin-bottom: 1rem;
        }

        .schedule-item {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.9rem;
            color: #d0d0d8;
            font-size: 0.95rem;
        }

        .schedule-item:last-child {
            margin-bottom: 0;
        }

        .schedule-item span:first-child {
            color: #fff;
            min-width: 90px;
            font-weight: 600;
        }

        @media (max-width: 980px) {
            .player-section {
                grid-template-columns: 1fr;
            }

            .live-side {
                position: static;
            }
        }

        @media (max-width: 680px) {
            .navbar {
                padding: 0.75rem 1rem;
                gap: 0.75rem;
            }
            main {
                margin-top: 74px;
                padding: 0.9rem 0.9rem 1.75rem;
            }
            .logo-brand {
                font-size: 1.2rem;
            }
            .logo {
                flex: 1 1 auto;
                min-width: 0;
            }
            .logo-icon {
                width: 36px;
                height: 36px;
                flex-basis: 36px;
            }
            .logo-tagline {
                display: none;
            }
            .nav-link {
                padding: 0.55rem 0.7rem;
                font-size: 0.82rem;
                white-space: nowrap;
            }
            .player-card,
            .schedule {
                border-radius: 18px;
            }
            .video-wrapper {
                min-height: 0;
            }
            .live-window-badge {
                top: 0.75rem;
                left: 0.75rem;
                width: 0.72rem;
                height: 0.72rem;
            }
            .player-actions {
                padding: 0.65rem;
                gap: 0.55rem;
            }
            .btn-secondary {
                width: 42px;
                height: 42px;
                min-height: 42px;
                border-radius: 11px;
            }
            .btn-secondary svg {
                width: 20px;
                height: 20px;
            }
            .channel-list {
                display: flex;
                gap: 0.75rem;
                margin-inline: -0.9rem;
                padding: 0 0.9rem 0.2rem;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
            }
            .channel-card {
                flex: 0 0 78%;
                scroll-snap-align: start;
                padding: 1rem;
            }
            .schedule {
                padding: 1.2rem;
            }
            .schedule-item {
                display: grid;
                grid-template-columns: 4rem 1fr;
                gap: 0.35rem 0.75rem;
            }
            .schedule-item span:last-child {
                grid-column: 2;
                color: #a8a8b2;
            }
        }

        @media (min-width: 981px) {
            .player-card {
                min-height: calc(100vh - 148px);
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo" onclick="window.location.href='index.html'">
        <img class="logo-icon" src="logo.png" alt="鑫艺影像馆 logo">
        <div class="logo-text">
            <div class="logo-brand">鑫艺影像馆</div>
            <div class="logo-tagline">经典电影 · 自由分享</div>
        </div>
    </div>
    <div>
        <a class="nav-link" href="index.html">返回首页</a>
    </div>
</nav>
<main>
    <section class="player-section" aria-label="直播影片">
        <div class="player-card">
            <div class="video-wrapper">
                <video id="livePlayer" playsinline></video>
                <div class="live-window-badge" aria-label="直播中"></div>
                <div class="player-status" id="liveStatus" aria-live="polite"></div>
            </div>
            <div class="player-actions" aria-label="直播控制">
                <button class="btn-secondary primary-action" id="playBtn" type="button" aria-label="播放" title="播放">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M8 5.5v13l10-6.5-10-6.5z"></path>
                    </svg>
                </button>
                <button class="btn-secondary" id="pauseBtn" type="button" aria-label="暂停" title="暂停">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 5h4v14H7zM13 5h4v14h-4z"></path>
                    </svg>
                </button>
                <button class="btn-secondary" id="refreshBtn" type="button" aria-label="刷新流" title="刷新流">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M20 12a8 8 0 1 1-2.34-5.66"></path>
                        <path d="M20 4v6h-6z"></path>
                    </svg>
                </button>
                <button class="btn-secondary" id="joinBtn" type="button" aria-label="加入直播" title="加入直播">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="none" stroke-width="2" stroke-linecap="round" d="M6.2 7.8a7 7 0 0 0 0 8.4M17.8 7.8a7 7 0 0 1 0 8.4"></path>
                        <circle cx="12" cy="12" r="3.2"></circle>
                    </svg>
                </button>
                <button class="btn-secondary" id="fullscreenBtn" type="button" aria-label="全屏" title="全屏">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M8 4H4v4M16 4h4v4M20 16v4h-4M4 16v4h4"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div class="live-side">
            <div class="channel-list" id="channelList"></div>
            <div class="schedule">
                <h3>直播节目表</h3>
                <div id="scheduleList"></div>
            </div>
        </div>
    </section>

</main>
<script src="player.js"></script>
<script>
    const liveChannels = [
        {
            id: 1,
            name: '经典电影频道',
            description: '经典电影实时播放',
            stream: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8'
        },
        {
            id: 2,
            name: '艺术大片频道',
            description: '沉浸式艺术影片实时连播',
            stream: 'https://test-streams.mux.dev/pts_shift/master.m3u8'
        },
        {
            id: 3,
            name: '纪录片频道',
            description: '纪录片夜间直播',
            stream: 'https://test-streams.mux.dev/4v3p6f8w/master.m3u8'
        }
    ];

    const programSchedule = [
        { time: '20:00', title: '经典电影巡礼', channel: '经典电影频道' },
        { time: '21:30', title: '艺术影像展映', channel: '艺术大片频道' },
        { time: '23:00', title: '纪录片夜聊', channel: '纪录片频道' }
    ];

    const video = document.getElementById('livePlayer');
    const liveStatus = document.getElementById('liveStatus');
    const channelList = document.getElementById('channelList');
    const scheduleList = document.getElementById('scheduleList');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const joinBtn = document.getElementById('joinBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const playerCard = document.querySelector('.player-card');

    let streamPlayer = null;
    let activeChannel = liveChannels[0];

    function renderChannels() {
        channelList.innerHTML = liveChannels.map(channel => `
            <div class="channel-card" data-id="${channel.id}">
                <h3>${channel.name}</h3>
                <p>${channel.description}</p>
            </div>
        `).join('');

        document.querySelectorAll('.channel-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = Number(card.getAttribute('data-id'));
                const channel = liveChannels.find(item => item.id === id);
                if (channel) {
                    selectChannel(channel);
                }
            });
        });
    }

    function renderSchedule() {
        scheduleList.innerHTML = programSchedule.map(item => `
            <div class="schedule-item">
                <span>${item.time}</span>
                <span>${item.title}</span>
                <span>${item.channel}</span>
            </div>
        `).join('');
    }

    function setupPlayer() {
        streamPlayer = new StreamPlayer(video, {
            autoplay: false,
            hlsConfig: {
                maxLoadingDelay: 4,
                maxAutoBitrate: 8000000,
                minAutoBitrate: 0,
                startLevel: -1
            }
        });

        streamPlayer.on('loading', () => setLiveStatus('正在连接直播源...'));
        streamPlayer.on('buffering', () => setLiveStatus('缓冲中...'));
        streamPlayer.on('buffered', () => setLiveStatus('直播流已就绪'));
        streamPlayer.on('play', () => {
            setLiveStatus('正在播放');
            updateControlState();
        });
        streamPlayer.on('pause', () => {
            setLiveStatus('已暂停');
            updateControlState();
        });
        streamPlayer.on('error', () => setLiveStatus('直播源异常，正在重试...'));
        streamPlayer.on('qualitychange', data => {
            setLiveStatus(`已切换至 ${data.height || '自动'} 画质`);
        });
    }

    function setLiveStatus(text) {
        liveStatus.textContent = text;
    }

    function updateControlState() {
        playBtn.disabled = !video.paused;
        pauseBtn.disabled = video.paused;
    }

    function playLive(statusText = '正在播放') {
        if (!streamPlayer) return;
        streamPlayer.play()
            .then(() => setLiveStatus(statusText))
            .catch(() => setLiveStatus('请点击播放以继续直播'));
    }

    function selectChannel(channel) {
        activeChannel = channel;
        document.querySelectorAll('.channel-card').forEach(card => {
            card.classList.toggle('active', Number(card.getAttribute('data-id')) === channel.id);
        });
        loadStream(channel.stream);
    }

    function loadStream(url) {
        if (!streamPlayer) return;
        streamPlayer.load(url, 'hls');
        setLiveStatus('直播源加载中...');
    }

    playBtn.addEventListener('click', () => {
        playLive('继续播放');
    });

    pauseBtn.addEventListener('click', () => {
        if (!streamPlayer) return;
        streamPlayer.pause();
        setLiveStatus('已暂停');
    });

    refreshBtn.addEventListener('click', () => {
        setLiveStatus('正在刷新播放流...');
        loadStream(activeChannel.stream);
    });

    joinBtn.addEventListener('click', () => {
        playLive('已加入直播，正在播放');
    });

    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            playerCard.requestFullscreen?.();
        } else {
            document.exitFullscreen?.();
        }
    });

    window.addEventListener('load', () => {
        renderChannels();
        renderSchedule();
        setupPlayer();
        selectChannel(activeChannel);
        updateControlState();
    });
</script>
</body>
</html>
